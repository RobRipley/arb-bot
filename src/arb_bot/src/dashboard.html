<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumi Arb Bot</title>
<style>
  :root {
    /* Surfaces — cold blue-black, shifting only lightness */
    --base: #0c0e14;
    --surface-1: #12151e;
    --surface-2: #181c28;
    --surface-3: #1e2333;
    --surface-input: #0a0c11;

    /* Borders — rgba, disappear when you're not looking */
    --border: rgba(255, 255, 255, 0.06);
    --border-emphasis: rgba(255, 255, 255, 0.10);
    --border-strong: rgba(255, 255, 255, 0.16);
    --border-focus: rgba(0, 212, 170, 0.4);

    /* Text — four levels */
    --text-primary: #e8ecf4;
    --text-secondary: #8b93a8;
    --text-tertiary: #5a6278;
    --text-muted: #3d4456;

    /* Accent — electric teal */
    --accent: #00d4aa;
    --accent-dim: rgba(0, 212, 170, 0.15);
    --accent-hover: #00eabc;

    /* Semantic */
    --profit: #00d4aa;
    --loss: #e06b9f;
    --loss-dim: rgba(224, 107, 159, 0.14);
    --warning: #f0b232;
    --warning-dim: rgba(240, 178, 50, 0.14);
    --info: #5b8af0;
    --info-dim: rgba(91, 138, 240, 0.14);

    /* Venue hues — the chip signature draws from these, nowhere else */
    --v-rumi: #00d4aa;
    --v-icpswap: #5b8af0;
    --v-partydex: #a78bfa;
    --v-bob: #f0a05b;
    --v-icp: #9aa4b2;
    --v-synth: #6b7280;

    /* Typography */
    --font-ui: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
    --font-data: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;

    /* Spacing — 4px base */
    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
    --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;

    /* Radii — sharp, technical */
    --radius-sm: 3px; --radius-md: 6px; --radius-lg: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }
  body {
    background: var(--base);
    color: var(--text-primary);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent-dim); color: var(--text-primary); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }

  button, input, select { font-family: inherit; }

  /* ═══════════════════ SHELL ═══════════════════ */

  .shell { display: grid; grid-template-columns: 208px 1fr; height: 100vh; }

  .sidebar {
    background: var(--base);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .sidebar-top { display: flex; flex-direction: column; }
  .sidebar-brand {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--text-primary);
    padding: var(--sp-5) var(--sp-5) var(--sp-4);
  }
  .sidebar-brand small {
    display: block;
    font-family: var(--font-data);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-top: 3px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    padding: 9px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: 0.15s;
    user-select: none;
  }
  .nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
  .nav-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--accent-dim);
  }
  .nav-badge {
    margin-left: auto;
    font-family: var(--font-data);
    font-size: 10px;
    font-weight: 600;
    color: var(--warning);
    background: var(--warning-dim);
    border-radius: var(--radius-sm);
    padding: 1px 6px;
  }
  .sidebar-bottom {
    padding: var(--sp-4);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: var(--sp-3);
  }
  .sidebar-status { display: flex; align-items: center; gap: var(--sp-2); font-size: 11px; color: var(--text-tertiary); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; background: var(--text-muted); flex-shrink:0; }
  .status-dot.live { background: var(--profit); box-shadow: 0 0 0 0 rgba(0,212,170,.5); animation: pulse-t 2.2s infinite; }
  .status-dot.warn { background: var(--warning); }
  @keyframes pulse-t { 0%{box-shadow:0 0 0 0 rgba(0,212,170,.45)} 70%{box-shadow:0 0 0 6px rgba(0,212,170,0)} 100%{box-shadow:0 0 0 0 rgba(0,212,170,0)} }
  .sidebar-principal { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); }

  .main { display: flex; flex-direction: column; min-width: 0; height: 100vh; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--sp-4) var(--sp-6);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: var(--sp-4);
  }
  .topbar-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar-right { display: flex; align-items: center; gap: var(--sp-3); }
  .freshness { font-family: var(--font-data); font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
  .freshness.live-now { color: var(--profit); }
  .progress-track { width: 64px; height: 3px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 2s linear; }

  .content { flex: 1; overflow-y: auto; padding: var(--sp-6); }
  .view { display: none; }
  .view.active { display: block; }

  /* ═══════════════════ PRIMITIVES ═══════════════════ */

  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--sp-5);
  }
  .card-header {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: var(--sp-3);
  }
  .card-subtitle { font-size: 12px; color: var(--text-tertiary); margin: -8px 0 var(--sp-4); line-height: 1.5; max-width: 640px; }

  .grid { display: grid; gap: var(--sp-4); }
  .g-cols-2 { grid-template-columns: 1fr 1fr; }
  .g-cols-3 { grid-template-columns: repeat(3, 1fr); }
  .g-cols-4 { grid-template-columns: repeat(4, 1fr); }

  .btn {
    background: var(--surface-2);
    color: var(--text-primary);
    border: 1px solid var(--border-emphasis);
    padding: 8px 14px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 500;
    transition: 0.12s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 32px;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface-3); border-color: var(--border-strong); }
  .btn:active { transform: scale(0.97); filter: brightness(0.9); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-sm { padding: 5px 10px; font-size: 11.5px; min-height: 26px; }
  .btn-primary { background: var(--accent); color: #06110d; border-color: var(--accent); font-weight: 600; }
  .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 0 3px var(--accent-dim); }
  .btn-danger { background: var(--loss); color: #1a0a12; border-color: var(--loss); font-weight: 600; }
  .btn-danger:hover { box-shadow: 0 0 0 3px rgba(224,107,159,0.2); }
  .btn-ghost { background: transparent; border-color: var(--border); }
  .btn-ghost:hover { border-color: var(--border-strong); }
  .btn-block { width: 100%; }
  .btn-group { display: flex; gap: var(--sp-2); flex-wrap: wrap; }

  label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); display: block; margin-bottom: 6px; }
  select, input[type="text"], input[type="number"] {
    background: var(--surface-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 9px 11px;
    border-radius: var(--radius-md);
    font-family: var(--font-data);
    font-size: 12.5px;
    width: 100%;
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }

  .divider { border-top: 1px solid var(--border); margin: var(--sp-4) 0; }

  .num { font-family: var(--font-data); font-variant-numeric: tabular-nums; }
  .positive { color: var(--profit); }
  .negative { color: var(--loss); }
  .text-sec { color: var(--text-secondary); }
  .text-ter { color: var(--text-tertiary); }
  .text-muted { color: var(--text-muted); }

  /* ── State badges — exactly the brief's vocabulary ── */
  .badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-data); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: var(--radius-sm); }
  .badge-live { color: var(--text-secondary); background: transparent; padding-left: 2px; }
  .badge-live::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--profit); box-shadow: 0 0 0 2px var(--accent-dim); }
  .badge-paused { color: var(--warning); background: var(--warning-dim); }
  .badge-dryrun { color: var(--info); background: var(--info-dim); }
  .badge-unconfigured { color: var(--text-tertiary); background: transparent; border: 1px dashed var(--border-strong); }
  .badge-blocked { color: var(--warning); background: var(--warning-dim); }
  .badge-stuck { color: var(--loss); background: var(--loss-dim); }
  .badge-reason { opacity: 0.8; font-weight: 500; text-transform: none; letter-spacing: 0.02em; }
  .ts-stale { color: var(--warning) !important; }
  .chip-cycling { animation: cycling-pulse 1.4s ease-in-out infinite; }
  @keyframes cycling-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Venue-pair chip — the signature ── */
  .vp-chip { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 18px; border-radius: 9px; overflow: hidden; border: 1px solid var(--border-strong); flex-shrink: 0; }
  .vp-chip.synth { border-style: dashed; }
  .vp-chip-half { position: absolute; top: 0; bottom: 0; width: 52%; }
  .vp-chip-half.a { left: 0; border-radius: 9px 0 0 9px; }
  .vp-chip-half.b { right: 0; border-radius: 0 9px 9px 0; }
  .vp-chip-letter { position: relative; z-index: 2; font-family: var(--font-data); font-weight: 700; font-size: 9.5px; color: #08090c; text-shadow: 0 0 3px rgba(255,255,255,0.5); letter-spacing: -0.02em; }
  .vp-wrap { display: inline-flex; align-items: center; gap: var(--sp-2); }
  .vp-label { font-size: 12px; color: var(--text-secondary); }
  .vp-label .sep { color: var(--text-muted); margin: 0 3px; }

  /* ── Real logo assets (amendment 11) — accompany names; the vp-chip stays the identity ── */
  .token-logo { width: 15px; height: 15px; border-radius: 50%; object-fit: cover; vertical-align: -3px; margin-right: 4px; background: var(--surface-3); }
  .venue-logo { width: 14px; height: 14px; border-radius: 50%; object-fit: cover; vertical-align: -3px; margin-right: 3px; background: var(--surface-3); }
  /* Right-attached variants for the mirrored pair/venue layout */
  .token-logo.logo-r { margin-right: 0; margin-left: 4px; }
  .venue-logo.logo-r { margin-right: 0; margin-left: 3px; }

  /* ── Cockpit bot-balances — vertical list (amendment 12, owner round 2) ── */
  .cockpit-top { grid-template-columns: 1.5fr 1fr 1fr; }
  .bal-list { display: flex; flex-direction: column; }
  .bal-row { display: flex; align-items: center; gap: var(--sp-2); padding: 4px 0; border-bottom: 1px solid var(--border); }
  .bal-row:last-child { border-bottom: none; }
  .bal-row .token-logo { margin-right: 0; flex-shrink: 0; }
  .bal-sym { font-size: 12px; color: var(--text-secondary); }
  .bal-val { font-family: var(--font-data); font-variant-numeric: tabular-nums; font-size: 12.5px; font-weight: 600; margin-left: auto; white-space: nowrap; }

  /* ── Swap panel (amendment 13) ── */
  .swap-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: var(--sp-4); align-items: start; }
  .swap-token-row { display: flex; align-items: center; gap: var(--sp-2); }
  .swap-token-row .token-logo { width: 18px; height: 18px; flex-shrink: 0; margin-right: 0; }
  .swap-arrow { align-self: center; color: var(--text-muted); font-size: 16px; padding-top: 12px; }
  .swap-bal { font-size: 11px; color: var(--text-tertiary); margin: 6px 0; display: flex; align-items: center; gap: var(--sp-2); }
  .swap-est { font-family: var(--font-data); font-variant-numeric: tabular-nums; font-size: 13px; margin-top: 10px; }
  .swap-route { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }

  /* ── Ledger legend (amendment 14, owner round 2: alignment, not decoration) ── */
  .legend-table { display: grid; grid-template-columns: auto 15px max-content max-content max-content 15px 1fr; gap: 2px var(--sp-3); align-items: center; }
  .lg-tl, .lg-tr { width: 15px; display: flex; align-items: center; }
  .lg-tl .token-logo, .lg-tr .token-logo { margin: 0; }
  .legend-row { display: contents; }
  .legend-fam { grid-column: 1 / -1; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); padding: var(--sp-3) 0 3px; border-bottom: 1px solid var(--border); }
  .lg-l { font-family: var(--font-data); font-variant-numeric: tabular-nums; font-size: 11.5px; text-align: right; white-space: nowrap; }
  .lg-c { color: var(--text-muted); font-size: 11px; text-align: center; }
  .lg-r { font-family: var(--font-data); font-variant-numeric: tabular-nums; font-size: 11.5px; white-space: nowrap; }
  .lg-v { color: var(--text-tertiary); font-family: var(--font-data); font-size: 10.5px; text-align: right; white-space: nowrap; }

  /* ── Global incident banner ── */
  .wedge-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: var(--sp-4);
    flex-wrap: wrap;
    background: linear-gradient(90deg, rgba(240,178,50,0.10), var(--surface-1) 55%);
    border: 1px solid rgba(240,178,50,0.35);
    border-radius: var(--radius-md);
    padding: var(--sp-3) var(--sp-5);
    margin: 0 var(--sp-6);
    margin-top: var(--sp-4);
  }
  .wedge-banner.show { display: flex; }
  .wedge-banner-msg { display: flex; align-items: center; gap: var(--sp-3); font-size: 13px; color: var(--text-primary); }
  .wedge-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warning); flex-shrink: 0; animation: pulse-w 1.4s infinite; }
  @keyframes pulse-w { 0%{box-shadow:0 0 0 0 rgba(240,178,50,.5)} 70%{box-shadow:0 0 0 8px rgba(240,178,50,0)} 100%{box-shadow:0 0 0 0 rgba(240,178,50,0)} }
  .wedge-banner-actions { display: flex; gap: var(--sp-2); align-items: center; }

  /* ═══════════════════ COCKPIT ═══════════════════ */

  .status-strip { display: flex; gap: var(--sp-2); flex-wrap: wrap; margin-bottom: var(--sp-4); }
  .status-chip {
    display: flex; align-items: center; gap: var(--sp-2);
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 9px 14px; cursor: pointer;
    transition: border-color .15s;
  }
  .status-chip:hover { border-color: var(--border-strong); }
  .status-chip-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-tertiary); }
  .status-chip-value { font-family: var(--font-data); font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
  .status-chip.warn { border-color: rgba(240,178,50,0.35); }
  .status-chip.warn .status-chip-value { color: var(--warning); }
  .status-chip.ok .status-chip-value { color: var(--profit); }
  .status-chip.info .status-chip-value { color: var(--info); }
  .status-chip.bad { border-color: rgba(224, 107, 159, 0.45); }
  .status-chip.bad .status-chip-value { color: var(--loss); }

  .hero-card { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: var(--sp-4); }
  .hero-number { font-family: var(--font-data); font-size: 42px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
  .hero-delta { font-family: var(--font-data); font-size: 13px; margin-top: 6px; }
  .hero-pockets { display: flex; gap: var(--sp-6); }
  .hero-pocket { text-align: right; }
  .hero-pocket-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: 4px; }
  .hero-pocket-value { font-family: var(--font-data); font-size: 17px; font-weight: 600; }

  .attn-list { display: flex; flex-direction: column; gap: var(--sp-2); }
  .attn-item {
    display: flex; align-items: center; gap: var(--sp-3);
    background: var(--surface-input); border: 1px solid var(--border);
    border-left: 3px solid var(--info); border-radius: var(--radius-md);
    padding: var(--sp-3) var(--sp-4);
  }
  .attn-item.opportunity { border-left-color: var(--profit); }
  .attn-item.incident { border-left-color: var(--loss); }
  .attn-body { flex: 1; min-width: 0; }
  .attn-title { font-size: 13px; color: var(--text-primary); margin-bottom: 2px; }
  .attn-meta { font-family: var(--font-data); font-size: 11px; color: var(--text-tertiary); }
  .attn-actions { display: flex; gap: var(--sp-2); flex-shrink: 0; }
  .attn-dismiss { background: transparent; border: 1px solid var(--border); color: var(--text-tertiary); border-radius: var(--radius-sm); cursor: pointer; width: 24px; height: 24px; font-size: 13px; line-height: 1; }
  .attn-dismiss:hover { color: var(--text-primary); border-color: var(--border-strong); }
  .attn-empty { text-align: center; padding: var(--sp-8) var(--sp-4); color: var(--text-tertiary); }
  .attn-empty-glyph { font-size: 22px; margin-bottom: var(--sp-2); color: var(--profit); }
  .attn-empty-text { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .attn-empty-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 4px; }

  /* ═══════════════════ MARKETS ═══════════════════ */

  .market-family { margin-bottom: var(--sp-6); }
  .family-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-2); padding: 0 2px; }
  .family-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-tertiary); display: flex; align-items: center; gap: var(--sp-2); }
  .family-count { color: var(--text-muted); font-weight: 500; }
  .family-toggle { background: transparent; border: 1px solid var(--border); color: var(--text-tertiary); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 11px; cursor: pointer; }
  .family-toggle:hover { color: var(--text-primary); border-color: var(--border-strong); }

  .market-group { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface-1); }
  .market-row { border-bottom: 1px solid var(--border); }
  .market-row:last-child { border-bottom: none; }
  .market-row-main { display: grid; grid-template-columns: auto 1fr auto auto auto auto; align-items: center; gap: var(--sp-4); padding: var(--sp-3) var(--sp-4); cursor: pointer; }
  .market-row-main:hover { background: rgba(255,255,255,0.015); }
  .market-row.paused .market-row-main { opacity: 0.55; }
  .market-row.hidden-paused { display: none; }
  .market-row.degraded .market-row-main { background: rgba(224,107,159,0.05); }

  .m-pair { display: flex; align-items: center; gap: var(--sp-3); min-width: 0; }
  .m-pair-name { font-size: 13px; color: var(--text-primary); white-space: nowrap; }
  .m-pair-sub { font-family: var(--font-data); font-size: 10.5px; color: var(--text-muted); }

  .m-gauge { width: 150px; }
  .m-gauge-track { height: 5px; background: var(--surface-3); border-radius: 3px; position: relative; }
  .m-gauge-fill { height: 100%; border-radius: 3px; position: absolute; top: 0; left: 0; background: var(--text-muted); transition: width .3s; }
  .m-gauge-fill.hot { background: var(--profit); }
  .m-gauge-fill.cost { background: var(--info); }
  .m-gauge-threshold { position: absolute; top: -3px; width: 1px; height: 11px; background: var(--text-tertiary); }
  .m-gauge-label { font-family: var(--font-data); font-size: 10.5px; color: var(--text-tertiary); margin-top: 4px; text-align: center; }

  .m-state { min-width: 78px; }
  .m-last { font-family: var(--font-data); font-size: 11px; color: var(--text-tertiary); min-width: 96px; text-align: right; }
  .m-last .pnl { display: block; font-size: 12px; margin-top: 2px; }
  .m-actions { display: flex; gap: 6px; }
  .m-caret { color: var(--text-muted); font-size: 11px; width: 12px; text-align: center; transition: transform .15s; }
  .market-row.expanded .m-caret { transform: rotate(90deg); color: var(--text-secondary); }

  .m-detail { display: none; padding: var(--sp-4) var(--sp-5) var(--sp-5); border-top: 1px solid var(--border); background: var(--surface-input); }
  .market-row.expanded .m-detail { display: block; }
  .m-detail-grid { display: grid; grid-template-columns: 1.1fr 0.8fr 1.3fr; gap: var(--sp-5); align-items: start; }
  .m-detail-block-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: var(--sp-2); }
  .m-params { display: flex; flex-direction: column; gap: 6px; }
  .m-param-row { display: flex; justify-content: space-between; font-size: 12px; }
  .m-param-k { color: var(--text-tertiary); }
  .m-param-v { font-family: var(--font-data); color: var(--text-primary); }
  .m-trades { display: flex; flex-direction: column; gap: 4px; }
  .m-trade-row { display: flex; justify-content: space-between; gap: var(--sp-2); font-family: var(--font-data); font-size: 11px; padding: 3px 0; border-bottom: 1px solid var(--border); }
  .m-trade-row:last-child { border-bottom: none; }
  .m-stranded-note { font-size: 11.5px; color: var(--warning); margin-top: var(--sp-2); background: var(--warning-dim); border-radius: var(--radius-sm); padding: 6px 9px; }

  .footnote { font-size: 11px; color: var(--text-muted); margin-top: var(--sp-3); }
  .footnote .mark { color: var(--text-tertiary); }

  /* ═══════════════════ CHARTS ═══════════════════ */

  .chart-family { margin-bottom: var(--sp-5); }
  .chart-legend { display: flex; gap: var(--sp-3); flex-wrap: wrap; margin-top: var(--sp-3); }
  .chart-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-secondary); cursor: pointer; user-select: none; }
  .chart-legend-item.off { opacity: 0.3; }
  .series-chip { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.2); }
  .series-chip-letter { font-family: var(--font-data); font-weight: 700; font-size: 9.5px; color: #08090c; text-shadow: 0 0 3px rgba(255,255,255,0.5); letter-spacing: -0.02em; }
  .chart-svg-wrap { position: relative; }
  .chart-axis-label { font-family: var(--font-data); font-size: 9.5px; fill: var(--text-muted); }

  /* ═══════════════════ MONEY ═══════════════════ */

  .money-table { width: 100%; border-collapse: collapse; }
  .money-table th { text-align: right; padding: var(--sp-2) var(--sp-3); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); border-bottom: 1px solid var(--border-strong); font-weight: 600; }
  .money-table th:first-child { text-align: left; }
  .money-table td { padding: var(--sp-2) var(--sp-3); border-bottom: 1px solid var(--border); font-family: var(--font-data); font-size: 12.5px; text-align: right; }
  .money-table td:first-child { text-align: left; font-family: var(--font-ui); font-size: 13px; }
  .money-table tr.total td { border-top: 1px solid var(--border-strong); border-bottom: none; font-weight: 600; color: var(--text-primary); }
  .money-table .dash { color: var(--text-muted); }
  .money-actions { display: flex; gap: var(--sp-2); flex-wrap: wrap; margin-top: var(--sp-4); }

  /* ═══════════════════ OPS ═══════════════════ */

  .lever-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: var(--sp-4); }
  .lever { border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface-input); padding: var(--sp-4); }
  .lever-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--sp-2); }
  .lever-name { font-size: 12.5px; font-weight: 500; }
  .lever-toggle { position: relative; width: 36px; height: 20px; border-radius: 10px; background: var(--surface-3); border: 1px solid var(--border-emphasis); cursor: pointer; flex-shrink: 0; }
  .lever-toggle::after { content: ''; position: absolute; top: 1px; left: 1px; width: 16px; height: 16px; border-radius: 50%; background: var(--text-tertiary); transition: .15s; }
  .lever-toggle.on { background: var(--accent-dim); border-color: var(--border-focus); }
  .lever-toggle.on::after { transform: translateX(16px); background: var(--accent); }
  .lever-sub { font-size: 11px; color: var(--text-tertiary); }
  .lever-toggle.applying { opacity: 0.5; pointer-events: none; }
  .mini-spin { display: inline-block; width: 10px; height: 10px; border: 1.5px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: -1px; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .setup-ok { color: var(--text-tertiary); font-family: var(--font-data); font-size: 11px; }
  .setup-warn { color: var(--warning); background: var(--warning-dim); font-family: var(--font-data); font-size: 11px; padding: 2px 6px; border-radius: var(--radius-sm); }

  .setup-table { width: 100%; border-collapse: collapse; }
  .setup-table td { padding: 7px var(--sp-2); font-size: 12px; border-bottom: 1px solid var(--border); }
  .setup-table td:first-child { color: var(--text-tertiary); width: 34%; }
  .setup-table td:last-child { font-family: var(--font-data); color: var(--text-secondary); word-break: break-all; }

  .incident-card { border-color: var(--border); transition: border-color .3s, box-shadow .3s; }
  .incident-card.hot { border-color: rgba(224,107,159,0.5); box-shadow: 0 0 0 1px rgba(224,107,159,0.12); }
  .incident-actions { display: flex; flex-direction: column; gap: var(--sp-2); }
  .incident-action { display: flex; align-items: center; justify-content: space-between; gap: var(--sp-3); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--sp-3); background: var(--surface-input); }
  .incident-action.recommend { border-color: rgba(224,107,159,0.4); background: rgba(224,107,159,0.05); }
  .incident-action-label { font-size: 12.5px; }
  .incident-action-cmd { font-family: var(--font-data); font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }
  .recommend-tag { font-family: var(--font-data); font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; color: var(--loss); background: rgba(224,107,159,0.14); padding: 2px 6px; border-radius: var(--radius-sm); margin-left: 6px; }

  /* ═══════════════════ LEDGER ═══════════════════ */

  .ledger-filters { display: flex; gap: var(--sp-2); flex-wrap: wrap; align-items: center; margin-bottom: var(--sp-4); }
  .ledger-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ledger-table th { text-align: left; padding: var(--sp-2); border-bottom: 1px solid var(--border-strong); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); font-weight: 600; white-space: nowrap; }
  .ledger-table td { padding: var(--sp-2); border-bottom: 1px solid var(--border); font-family: var(--font-data); vertical-align: middle; }
  .ledger-legs { font-size: 10.5px; color: var(--text-muted); }
  .table-wrap { overflow-x: auto; }
  .ledger-note { font-size: 11.5px; color: var(--text-muted); margin-top: var(--sp-3); }

  /* ═══════════════════ MODAL ═══════════════════ */

  .modal-overlay { position: fixed; inset: 0; background: rgba(6,7,10,0.6); backdrop-filter: blur(2px); display: none; align-items: center; justify-content: center; z-index: 200; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface-2); border: 1px solid var(--border-strong); border-radius: var(--radius-lg); padding: var(--sp-6); width: 380px; max-width: calc(100vw - 40px); }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: var(--sp-2); }
  .modal-body { font-size: 13px; color: var(--text-secondary); line-height: 1.55; margin-bottom: var(--sp-5); }
  .modal-body .amount { font-family: var(--font-data); color: var(--text-primary); font-weight: 600; }
  .modal-actions { display: flex; gap: var(--sp-3); justify-content: flex-end; }
  .modal.danger { border-color: rgba(224, 107, 159, 0.55); }
  .modal.danger .modal-title { color: var(--loss); }
  .modal-kv { display: flex; justify-content: space-between; gap: var(--sp-3); font-size: 12.5px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .modal-kv .k { color: var(--text-tertiary); flex-shrink: 0; }
  .modal-kv .v { font-family: var(--font-data); color: var(--text-primary); text-align: right; word-break: break-word; }

  /* ═══════════════════ TOAST ═══════════════════ */

  #toast { position: fixed; bottom: 22px; right: 22px; background: var(--surface-2); border: 1px solid var(--border-strong); padding: 12px 18px; border-radius: var(--radius-md); font-size: 12.5px; z-index: 300; max-width: 340px; opacity: 0; transform: translateY(8px); transition: .18s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { border-color: rgba(0,212,170,0.4); }
  #toast.error { border-color: rgba(224,107,159,0.4); }

  /* ═══════════════════ INCIDENT DEMO SWITCH ═══════════════════ */

  .incident-fab {
    position: fixed; bottom: 20px; left: 224px; z-index: 150;
    display: flex; align-items: center; gap: var(--sp-2);
    background: var(--surface-2); border: 1px solid var(--border-strong);
    border-radius: 999px; padding: 7px 14px 7px 7px;
  }
  .incident-fab-label { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
  .fab-switch { position: relative; width: 34px; height: 19px; border-radius: 10px; background: var(--surface-3); border: 1px solid var(--border-emphasis); cursor: pointer; flex-shrink: 0; }
  .fab-switch::after { content: ''; position: absolute; top: 1px; left: 1px; width: 15px; height: 15px; border-radius: 50%; background: var(--text-tertiary); transition: .15s; }
  .fab-switch.on { background: rgba(224,107,159,0.2); border-color: rgba(224,107,159,0.5); }
  .fab-switch.on::after { transform: translateX(15px); background: var(--loss); }

  /* ═══════════════════ RESPONSIVE ═══════════════════ */

  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; min-height: 100vh; }
    .sidebar { flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; height: 52px; flex-shrink: 0; }
    .sidebar-top { flex-direction: row; align-items: center; flex: 1; min-width: 0; }
    .sidebar-brand { padding: 0 var(--sp-3); white-space: nowrap; flex-shrink: 0; }
    .sidebar-brand small { display: none; }
    #nav-list { display: flex; align-items: center; overflow-x: auto; flex: 1; min-width: 0; }
    .nav-item { border-left: none; border-bottom: 2px solid transparent; padding: var(--sp-3) 12px; white-space: nowrap; flex-shrink: 0; }
    .nav-item.active { border-bottom-color: var(--accent); }
    .sidebar-bottom { border-top: none; border-left: 1px solid var(--border); padding: var(--sp-2) var(--sp-3); flex-direction: row; align-items: center; flex-shrink: 0; }
    .sidebar-principal { display: none; }
    .main { height: auto; }
    .content { overflow-y: visible; padding: var(--sp-4); }
    .topbar { padding: var(--sp-3) var(--sp-4); }
    .g-cols-2, .g-cols-3, .g-cols-4 { grid-template-columns: 1fr 1fr; }
    .deck-4 { grid-template-columns: 1fr 1fr; }
    .hero-card { flex-direction: column; align-items: flex-start; }
    .hero-pockets { gap: var(--sp-4); width: 100%; justify-content: space-between; }
    .hero-pocket { text-align: left; }
    .market-row-main { grid-template-columns: 1fr; gap: var(--sp-2); }
    .m-gauge { width: 100%; }
    .m-state, .m-last { text-align: left; }
    .m-actions { justify-content: flex-start; }
    .m-detail-grid { grid-template-columns: 1fr; }
    .status-strip { flex-direction: column; }
    .status-chip { justify-content: space-between; }
    .swap-grid { grid-template-columns: 1fr; }
    .swap-arrow { display: none; }
    .cockpit-top { grid-template-columns: 1fr; }
    .legend-table { display: block; }
    .legend-row { display: flex; flex-wrap: wrap; align-items: center; gap: 4px 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .legend-row:last-child { border-bottom: none; }
    .lg-l, .lg-r { text-align: left; white-space: normal; }
    .lg-tl:empty, .lg-tr:empty { display: none; }
    .lg-tl, .lg-tr { width: auto; }
    .lg-v { flex-basis: 100%; text-align: left; margin-left: 38px; }
    .legend-fam { display: block; border-bottom: none; }
    .incident-fab { left: 12px; bottom: 12px; }
    .wedge-banner { margin: var(--sp-3) var(--sp-4) 0; flex-direction: column; align-items: flex-start; }
  }
  @media (max-width: 480px) {
    .g-cols-2, .g-cols-3, .g-cols-4, .deck-4 { grid-template-columns: 1fr; }
    .hero-number { font-size: 32px; }
  }

  /* ═══════════════════ ADDITIONS: real-data wiring needs ═══════════════════ */

  /* Tab/filter chips (activity filter, chart tabs, ledger legend toggle) — not
     part of the prototype's own stylesheet (it referenced .chip without
     defining it); ported from the current production dashboard. */
  .chip { display: inline-flex; align-items: center; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; font-family: var(--font-ui); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); transition: 0.15s; }
  .chip:hover { border-color: var(--border-emphasis); color: var(--text-primary); }
  .chip:active { transform: scale(0.95); transition: transform 0.05s; }
  .chip.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(0, 212, 170, 0.3); }
  .chip-sm { padding: 3px 10px; font-size: 11px; }

  input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

  /* Dirty-tracked config inputs (Ops › Setup / Levers forms): a value the user
     has typed/toggled since the last hydration or save — never silently
     clobbered by the next poll. */
  .cfg-dirty { border-color: var(--warning) !important; box-shadow: 0 0 0 1px rgba(240,178,50,0.25); }

  .status-dot.paused { background: var(--warning); }
  .status-dot.stuck { background: var(--loss); animation: pulse-w 1.4s infinite; }

  /* Cold-load instant paint: cached numbers render at reduced opacity until
     the first live loadAll() resolves — "as of <time>", never a dead minute. */
  .stale-paint { opacity: 0.72; }

  .activity-entry { display: flex; gap: var(--sp-3); padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .activity-entry:last-child { border-bottom: none; }
  .activity-ts { font-family: var(--font-data); color: var(--text-tertiary); white-space: nowrap; }
  .activity-cat { font-family: var(--font-data); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }

  .pagination { display: flex; align-items: center; gap: var(--sp-2); margin-top: var(--sp-3); font-size: 12px; color: var(--text-tertiary); }
  .ledger-pagesize { display: flex; align-items: center; gap: 4px; margin-left: var(--sp-3); }

  .swap-panel-sm .swap-token-row .token-logo { width: 15px; height: 15px; }
  .fund-vol-grid { display: flex; gap: var(--sp-2); flex-wrap: wrap; align-items: flex-end; }
  .fund-vol-grid > div { flex: 1; min-width: 120px; }

  .deposit-addr-row { display: flex; align-items: center; justify-content: space-between; gap: var(--sp-2); padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .deposit-addr-row:last-child { border-bottom: none; }
  .deposit-addr-row .addr { font-family: var(--font-data); color: var(--text-secondary); cursor: pointer; word-break: break-all; }

  .lever-toggle.off-state::after { background: var(--text-tertiary); }
</style>
</head>
<body>

<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">Rumi Arb Bot<small>Cockpit</small></div>
      <div id="nav-list"></div>
    </div>

      <div class="sidebar-status"><span class="status-dot" id="status-dot"></span><span id="status-label">Connecting…</span></div>

  <div class="main">

        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <section class="view" id="view-markets"></section>

      <section class="view" id="view-money"></section>
      <section class="view" id="view-ops"></section>

  </div>
</div>

<div class="modal-overlay" id="confirm-overlay">

      <button class="btn btn-primary" id="confirm-btn">Confirm</button>

  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script type="importmap">
  {
    "imports": {

      "@dfinity/auth-client": "https://esm.sh/@dfinity/auth-client@2.4.1?deps=@dfinity/agent@2.4.1,@dfinity/candid@2.4.1,@dfinity/identity@2.4.1,@dfinity/principal@2.4.1",
      "@dfinity/candid": "https://esm.sh/@dfinity/candid@2.4.1?deps=@dfinity/principal@2.4.1",
      "@dfinity/principal": "https://esm.sh/@dfinity/principal@2.4.1",
      "@dfinity/identity": "https://esm.sh/@dfinity/identity@2.4.1?deps=@dfinity/agent@2.4.1,@dfinity/candid@2.4.1,@dfinity/principal@2.4.1"
    }
  }
</script>
<script type="module">
    import { HttpAgent, Actor } from '@dfinity/agent';
    import { AuthClient } from '@dfinity/auth-client';
    import { IDL } from '@dfinity/candid';
    import { Principal } from '@dfinity/principal';

    // ═══════ IDL — hand-maintained; keep in lockstep with Rust + .did (scripts/check-candid.sh) ═══════

    const Direction = IDL.Variant({ RumiToIcpswap: IDL.Null, IcpswapToRumi: IDL.Null });
    const TokenVariant = IDL.Variant({ ThreeUSD: IDL.Null, CkUSDC: IDL.Null });

    const BotConfig = IDL.Record({ owner: IDL.Principal, rumi_amm: IDL.Principal, rumi_3pool: IDL.Principal, rumi_amm_paused: IDL.Bool, icpswap_pool: IDL.Principal, icp_ledger: IDL.Principal, ckusdc_ledger: IDL.Principal, three_usd_ledger: IDL.Principal, min_spread_bps: IDL.Nat32, max_trade_size_usd: IDL.Nat64, paused: IDL.Bool, icpswap_icp_is_token0: IDL.Bool, admins: IDL.Vec(IDL.Principal), icpswap_icusd_pool: IDL.Principal, icusd_ledger: IDL.Principal, icpswap_icusd_icp_is_token0: IDL.Bool, min_profit_usd: IDL.Int64, icpswap_ckusdt_pool: IDL.Principal, ckusdt_ledger: IDL.Principal, icpswap_ckusdt_icp_is_token0: IDL.Bool, icpswap_3usd_pool: IDL.Principal, icpswap_3usd_icp_is_token0: IDL.Bool, slippage_bps: IDL.Nat64, arb_interval_secs: IDL.Nat64, partydex_ckusdc_pool: IDL.Principal, partydex_ckusdt_pool: IDL.Principal, partydex_ckusdc_fee_pips: IDL.Nat32, partydex_ckusdt_fee_pips: IDL.Nat32, icp_inventory_floor_e8s: IDL.Nat64, icp_inventory_ceiling_e8s: IDL.Nat64, bob_inventory_floor_e8s: IDL.Nat64, bob_inventory_ceiling_e8s: IDL.Nat64, bob_ledger: IDL.Principal, bob_ledger_fee: IDL.Nat64, icpswap_bob_icp_pool: IDL.Principal, icpswap_icusd_bob_pool: IDL.Principal, icpswap_bob_icp_icp_is_token0: IDL.Bool, icpswap_icusd_bob_icusd_is_token0: IDL.Bool, bob_max_trade_size_usd: IDL.Nat64, bob_min_spread_bps: IDL.Nat64, bob_execution_enabled: IDL.Bool });
    const TradeRecord = IDL.Record({ timestamp: IDL.Nat64, direction: Direction, icp_amount: IDL.Nat64, input_amount: IDL.Nat64, input_token: TokenVariant, output_amount: IDL.Nat64, output_token: TokenVariant, virtual_price: IDL.Nat64, ledger_fees_usd: IDL.Int64, net_profit_usd: IDL.Int64, spread_bps: IDL.Nat32 });

    const TOKEN_LOGO_KEYS = { ckUSDC: 'ckusdc', ckUSDT: 'ckusdt', icUSD: 'icusd', '3USD': '3usd', ICP: 'icp', BOB: 'bob' };

    const FAMILY_LOGO_KEYS = { 'rumi-cross': ['rumi'], 'icpswap-internal': ['icpswap'], 'partydex-icpswap': ['partydex', 'icpswap'], 'bob': ['bob'], 'volume': [] };

    function tokenLogo(sym) {
      const k = TOKEN_LOGO_KEYS[sym];
      return k && LOGOS[k] ? `<img class="token-logo" src="${LOGOS[k]}" alt="">` : '';
    }
    function tokenLogoR(sym) {
      const k = TOKEN_LOGO_KEYS[sym];
      return k && LOGOS[k] ? `<img class="token-logo logo-r" src="${LOGOS[k]}" alt="">` : '';
    }
    function venueLogo(venueKey) {
      const k = VENUE_LOGO_KEYS[venueKey];
      return k && LOGOS[k] ? `<img class="venue-logo" src="${LOGOS[k]}" alt="">` : '';
    }
    function venueLogoR(venueKey) {
      const k = VENUE_LOGO_KEYS[venueKey];
      return k && LOGOS[k] ? `<img class="venue-logo logo-r" src="${LOGOS[k]}" alt="">` : '';
    }
    function familyLogos(fam) {
      return (FAMILY_LOGO_KEYS[fam] || []).map(venueLogo).join('');
    }
    // The distinguishing token of a pool = its non-ICP token. ICP never gets a logo in pair labels.
    function distToken(side) {
      const m = String(side).match(/ckUSDC|ckUSDT|icUSD|3USD|BOB/);
      return m ? m[0] : null;
    }
    // Mirrored pair line (amendment 15): left pool's logo far-left, right pool's
    // far-right, nothing between the tickers but the arrow. Synthetic side: no logo.
    function mirroredPair(pair) {
      const parts = String(pair).split('↔');
      if (parts.length === 2) {
        const l = parts[0].trim(), r = parts[1].trim();
        const lt = distToken(l), rt = distToken(r);
        return `${lt ? tokenLogo(lt) : ''}${esc(l)} ↔ ${esc(r)}${rt ? tokenLogoR(rt) : ''}`;
      }
      const t = distToken(pair);
      return `${t ? tokenLogo(t) : ''}${esc(pair)}`;
    }
    // Mirrored venue line: logos toward the center ×. e.g. "ICPSwap ⊙ × ⊙ ICPSwap"
    function mirroredVenues(vA, vB) {
      return `${esc(VENUES[vA].name)}${venueLogoR(vA)} × ${venueLogo(vB)}${esc(VENUES[vB].name)}`;

    const STRATEGY_BY_ID = Object.fromEntries(STRATEGIES.map(s => [s.id, s]));

    // ── Per-strategy chart color (bug fix: family small-multiples used to draw
    // every series in one flat family hue, e.g. all 6 PartyDEX×ICPSwap series
    // in the same purple — unreadable). Each strategy gets a distinct, stable
    // color anchored to its family's venue hue: hue is fanned out across the
    // family (wider fan for bigger families, e.g. the 6-series PartyDEX family
    // spreads blue → purple → magenta) and lightness alternates so hue-adjacent
    // neighbors also separate in value. Single-series families are untouched.
    function hexToHsl(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h = 0, s = 0; const l = (max + min) / 2;
      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
        else if (max === g) h = (b - r) / d + 2;
        else h = (r - g) / d + 4;
        h *= 60;
      }
      return [h, s * 100, l * 100];
    }
    function hslToHex(h, s, l) {
      h = ((h % 360) + 360) % 360; s = Math.max(0, Math.min(100, s)) / 100; l = Math.max(0, Math.min(100, l)) / 100;
      const c = (1 - Math.abs(2 * l - 1)) * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = l - c / 2;
      let r, g, b;
      if (h < 60) [r, g, b] = [c, x, 0];
      else if (h < 120) [r, g, b] = [x, c, 0];
      else if (h < 180) [r, g, b] = [0, c, x];
      else if (h < 240) [r, g, b] = [0, x, c];
      else if (h < 300) [r, g, b] = [x, 0, c];
      else [r, g, b] = [c, 0, x];
      const toHex = v => Math.round((v + m) * 255).toString(16).padStart(2, '0');
      return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    // Build `count` distinct-but-related colors anchored at baseHex's hue.
    function familyColorRamp(baseHex, count) {
      if (count <= 1) return [baseHex];
      const [h, s, l] = hexToHsl(baseHex);
      const sat = Math.max(55, Math.min(88, s));
      const arc = Math.min(120, 20 * count); // wider fan for bigger families
      const centerL = l * 0.4 + 58 * 0.6; // pull toward a readable middle so the ramp doesn't clip at the ends
      const colors = [];
      for (let i = 0; i < count; i++) {
        const t = i / (count - 1);
        const hueOffset = (t - 0.5) * arc;
        const sign = i % 2 === 0 ? -1 : 1;
        const lightOffset = sign * (4 + 4 * Math.floor(i / 2));
        const lightness = Math.max(34, Math.min(80, centerL + lightOffset));
        colors.push(hslToHex(h + hueOffset, sat, lightness));
      }
      return colors;
    }

      Object.keys(byFamily).forEach(fam => {

        const ramp = familyColorRamp(venueHex(famStrats[0].vA), famStrats.length);
        famStrats.forEach((s, i) => { s.chartColor = ramp[i]; });

    // ═══════ Cold-load cache (localStorage) ═══════
    //
    // Real cache of the last-rendered summary/snapshot/balances — instant paint

    // BigInts (JSON-unsafe) before storage; every cached numeric field is a
    // plain Number in USD-or-native units, already divided by decimals.
    const CACHE_KEY = 'rumi_dash_cache_v1';
    function saveCache() {
      try {
        const snap = latestSnapshot;
        const payload = {
          ts: Date.now(),
          config: currentConfig ? {
            paused: currentConfig.paused,
            rumi_amm_paused: currentConfig.rumi_amm_paused,
            bob_execution_enabled: currentConfig.bob_execution_enabled,
            min_spread_bps: bi(currentConfig.min_spread_bps),
            bob_min_spread_bps: bi(currentConfig.bob_min_spread_bps),
            arb_interval_secs: bi(currentConfig.arb_interval_secs),
            slippage_bps: bi(currentConfig.slippage_bps),

          summary: window._lastSummary || null,
          spreads: snap ? STRATEGIES.reduce((o, s) => { o[s.id] = bi(snap[s.spreadField]); return o; }, {}) : null,
          balances: window._rawBals ? {
            b3usd: bi(window._rawBals.b3usd), bCkusdc: bi(window._rawBals.bCkusdc), bCkusdt: bi(window._rawBals.bCkusdt),
            bIcusd: bi(window._rawBals.bIcusd), bIcp: bi(window._rawBals.bIcp), bBob: bi(window._rawBals.bBob || 0),
          } : null,
          volBalances: window._rawVolBals || null,
          prices: window._latestPrices || null,
        };
        localStorage.setItem(CACHE_KEY, JSON.stringify(payload));
      } catch (e) { /* storage full/unavailable — cache is a nicety, not load-bearing */ }
    }
    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }
    // Paint the cached snapshot instantly (stale-styled), before the first
    // live loadAll() resolves. Skeletons only on a true first-ever visit
    // (cache === null).
    // NOTE: currentConfig is intentionally left null here — the cache only
    // carries a handful of plain booleans/numbers (see saveCache), never a
    // full BotConfig (no Principal fields). Faking a partial BotConfig would
    // crash the first render the moment anything touches a Principal field
    // (e.g. `.toText()`), which would abort init() entirely and leave the
    // whole app stuck on "Connecting…" forever. Cold flags live in
    // window._coldFlags instead; render code must check `currentConfig`
    // (not the cold flags) before touching anything Principal-shaped.
    function paintFromCache() {
      try {
        const cache = loadCache();
        const fresh = document.getElementById('freshness');
        if (!cache) {
          fresh.textContent = 'First load…';
          renderAll();
          return;

        window._coldFlags = cache.config || null;

        window._latestPrices = window._latestPrices || cache.prices;
        if (cache.spreads && !latestSnapshot) {
          latestSnapshot = { __cold: true, __spreads: cache.spreads };
        }
        window._rawBals = window._rawBals || cache.balances;
        window._rawVolBals = window._rawVolBals || cache.volBalances;
        fresh.textContent = 'as of ' + new Date(cache.ts).toLocaleTimeString();
        state.coldPainted = true;
        renderAll();
      } catch (e) {
        // Cold paint is a nicety, never load-bearing — a bad/old cache entry
        // must never block init() from creating actors and loading live data.
        console.error('paintFromCache (non-fatal):', e);
      }
    }

    // ═══════ Health / wedge banner ═══════
    //
    // Ported from the Phase-1 wedge-banner logic essentially unchanged: same
    // conditions, same stuck-cycle math, same admin-report vs public-flags
    // split. Only the rendering target (the prototype's banner template) and
    // the surfaces it feeds (Cockpit status strip + attention list, Markets
    // BLOCKED/STUCK badges) are new.

    const POOL_LABELS = {
      IcusdIcp: 'icUSD / ICP', ThreeUsdIcp: '3USD / ICP', IcusdBob: 'icUSD / BOB',
      RumiThreeUsd: 'Rumi 3USD', IcpswapCkusdc: 'ICPSwap ckUSDC', IcpswapIcusd: 'ICPSwap icUSD',
      IcpswapCkusdt: 'ICPSwap ckUSDT', IcpswapThreeUsd: 'ICPSwap 3USD',
    };
    const BOB_POOL_LABELS = { IcusdBob: 'ICPSwap icUSD/BOB', BobIcp: 'ICPSwap BOB/ICP' };
    const DIRECTION_LABELS = { BuyIcp: 'Buy ICP', SellIcp: 'Sell ICP', BuyBob: 'Buy BOB', SellBob: 'Sell BOB' };
    function poolLabel(v) { return POOL_LABELS[variantKey(v)] || variantKey(v); }
    function bobPoolLabel(v) { return BOB_POOL_LABELS[variantKey(v)] || variantKey(v); }
    function directionLabel(v) { return DIRECTION_LABELS[variantKey(v)] || variantKey(v); }
    function fmtUsd6(n) { return (Number(n) / 1e6).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function fmtSignedUsd6(n) { const v = Number(n) / 1e6; return (v >= 0 ? '+' : '') + v.toFixed(2); }
    function fmtElapsed(nsNow, tsNs) {
      const secs = Number((nsNow - tsNs) / 1_000_000_000n);
      if (secs < 60) return secs + 's';
      if (secs < 3600) return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
      const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60);
      return h + 'h ' + m + 'm';
    }

    // Maps a PendingExit's (entry_pool, intended_exit_pool) back to a strategy
    // letter — real fields, deterministic match against the STRATEGIES registry's
    // venue pair, never a fabricated guess. Only the rumi-cross family currently
    // produces two-hop pending exits (A/C/D/Q/R each has a fixed entry/exit pool
    // pair); returns null (not "which strategy", just "blocked") if unmatched.
    const POOL_VARIANT_TO_STRATEGY = {
      'RumiThreeUsd|IcpswapCkusdc': 'A', 'RumiThreeUsd|IcpswapCkusdt': 'C', 'RumiThreeUsd|IcpswapIcusd': 'D',
      'RumiThreeUsd|PartyDexIcpCkusdc': 'Q', 'RumiThreeUsd|PartyDexIcpCkusdt': 'R',
    };
    function strategyForPendingExit(pending) {
      if (!pending) return null;
      const a = variantKey(pending.entry_pool), b = variantKey(pending.intended_exit_pool);
      return POOL_VARIANT_TO_STRATEGY[a + '|' + b] || POOL_VARIANT_TO_STRATEGY[b + '|' + a] || null;
    }

    function fetchHealth() {
      if (!authenticatedActor) return Promise.resolve(null);
      if (healthRequestPromise) return healthRequestPromise;
      healthRequestPromise = (async () => {
        try {
          const report = await authenticatedActor.get_bot_health();
          latestHealthReport = report;
          updateWedgeBanner(report);
          if (state.activeView === 'ops' || state.activeView === 'cockpit' || state.activeView === 'markets') renderCurrentView();
          return report;
        } catch (e) {
          toast('Health load failed: ' + e.message, 'error');
          return null;
        } finally { healthRequestPromise = null; }
      })();
      return healthRequestPromise;
    }

    function wedgeConditions(report) {
      if (!report) return [];
      const out = [];
      if (optVal(report.pending_exit)) out.push('pending_exit');
      if (optVal(report.pending_bob_exit)) out.push('pending_bob_exit');
      if (bi(report.volume_stranded_icp) > 0) out.push('volume_stranded_icp');
      if (bi(report.volume_stranded_bob) > 0) out.push('volume_stranded_bob');
      if (arbCycleStuckSecs(report) != null) out.push('arb_cycle_stuck');
      return out;
    }
    function arbCycleStuckSecs(report) {
      const startedNs = optVal(report.arb_cycle_started_at_ns);
      if (!report.arb_cycle_in_progress || startedNs == null || !currentConfig) return null;
      const ageSecs = Number((BigInt(Date.now()) * 1_000_000n - startedNs) / 1_000_000_000n);
      const intervalSecs = bi(currentConfig.arb_interval_secs);
      return ageSecs > 3 * intervalSecs ? ageSecs : null;
    }
    function wedgeMessage(conditions, report) {
      const parts = [];
      if (conditions.includes('pending_exit')) {
        const sid = strategyForPendingExit(optVal(report.pending_exit));
        parts.push(`Arb Leg 2 pending exit is stuck${sid ? ' (Strategy ' + sid + ')' : ''}`);
      }
      if (conditions.includes('pending_bob_exit')) parts.push('Strategy S BOB exit is stuck');
      if (conditions.includes('volume_stranded_icp')) parts.push((Number(report.volume_stranded_icp) / 1e8).toFixed(4) + ' ICP stranded in the volume bot');
      if (conditions.includes('volume_stranded_bob')) parts.push((Number(report.volume_stranded_bob) / 1e8).toFixed(4) + ' BOB stranded in the volume bot');
      if (conditions.includes('arb_cycle_stuck')) {
        const secs = arbCycleStuckSecs(report);
        parts.push('Arb cycle stuck in progress for ' + Math.floor(secs / 60) + 'm (interval ' + bi(currentConfig.arb_interval_secs) + 's)');
      }
      return parts.join(' — ');
    }
    function renderBanner() {
      const el = document.getElementById('wedge-banner');
      const conditions = latestHealthReport ? wedgeConditions(latestHealthReport) : (window._publicWedge || []);
      if (conditions.length === 0) { el.classList.remove('show'); el.innerHTML = ''; currentWedgeKey = null; wedgeDismissedKey = null; return; }
      const key = conditions.join(',');
      currentWedgeKey = key;
      if (wedgeDismissedKey === key) { el.classList.remove('show'); el.innerHTML = ''; return; }
      const message = latestHealthReport ? wedgeMessage(conditions, latestHealthReport) : 'Bot may be stuck — log in for details.';
      el.classList.add('show');
      el.innerHTML = `
        <div class="wedge-banner-msg"><span class="wedge-dot"></span><span><strong>Cycle may be stuck.</strong> ${esc(message)}</span></div>
        <div class="wedge-banner-actions">
          <button class="btn btn-sm btn-ghost" onclick="goTo('markets')">View market</button>
          ${isAdmin ? `<button class="btn btn-sm btn-danger" onclick="goTo('ops')">Open incident toolkit</button>` : ''}
          <button class="attn-dismiss" title="Dismiss" onclick="dismissWedgeBanner()">×</button>
        </div>`;
    }
    function updateWedgeBanner(report) { renderBanner(); }
    window.dismissWedgeBanner = function () { wedgeDismissedKey = currentWedgeKey; renderBanner(); };

    function fetchPublicHealth() {
      if (authenticatedActor || !anonymousActor) return Promise.resolve(null);

          window._publicWedge = conditions;

          return pub;
        } catch (e) { console.error('public health poll failed:', e); return null; }
        finally { publicHealthRequestPromise = null; }
      })();
      return publicHealthRequestPromise;
    }

    // Fetches raw legs starting at `offset` and pairs them (pairLegs, defined
    // below — hoisted) until at least `pageSize` leg-groups are assembled or
    // the ledger is exhausted. A leg-group can span more raw legs than a flat
    // fixed-size fetch would guess (drains/top-ups/unpaired legs skew the
    // ratio), so this grows the raw fetch rather than assume a fixed 2:1
    // legs-per-group ratio — the previous bug compared a paired-group count
    // against a raw-leg page size, which is why Next was permanently disabled
    // (see fix note in loadLedgerPage).
    async function fetchLedgerGroups(offset, pageSize) {
      let rawLimit = pageSize * 3;
      let legs = [], allGroups = [], isLastFetch = false;
      for (let attempt = 0; attempt < 4; attempt++) {
        try {
          legs = await anonymousActor.get_trade_legs(BigInt(offset), BigInt(rawLimit));
        } catch (e) { console.error('fetchLedgerGroups:', e); legs = []; break; }
        allGroups = pairLegs(legs);
        isLastFetch = legs.length < rawLimit;
        if (allGroups.length >= pageSize || isLastFetch) break;
        rawLimit *= 2;
      }
      const shown = allGroups.slice(0, pageSize);
      const consumedLegs = shown.reduce((n, g) => n + g.legs.length, 0);
      const hasMore = !isLastFetch || allGroups.length > shown.length;
      return { shown, consumedLegs, hasMore };
    }

    // ═══════ Market state computation — the registry's live layer ═══════
    //
    // Derives the 7-state vocabulary (amendment 1) for every strategy/pool row
    // from real get_config / get_snapshots / get_bot_health / get_volume_stats
    // data. This function (not hand-written per-strategy branches) is what lets
    // a new venue be "one registry entry" per system.md.

    function marketFacts() {
      const c = currentConfig;
      const snap = latestSnapshot;
      const spread = (field) => {
        if (!snap) return null;
        if (snap.__cold) return snap.__spreads[fieldToId(field)] ?? null;
        return snap[field] !== undefined ? bi(snap[field]) : null;
      };
      function fieldToId(field) { const m = STRATEGIES.find(s => s.spreadField === field); return m ? m.id : null; }
      const icusdPrice = snap ? (snap.__cold ? 1 : bi(snap.icpswap_icp_price_icusd)) : 0; // cold cache has no raw price; treated as configured
      const ckusdtPrice = snap ? (snap.__cold ? 1 : bi(snap.icpswap_icp_price_ckusdt)) : 0;
      const pdc = c ? c.partydex_ckusdc_pool.toText() !== '2vxsx-fae' : false;
      const pdt = c ? c.partydex_ckusdt_pool.toText() !== '2vxsx-fae' : false;
      const hasBob = c ? (c.icpswap_icusd_bob_pool.toText() !== '2vxsx-fae' && c.icpswap_bob_icp_pool.toText() !== '2vxsx-fae') : false;
      return {
        c, snap, spread,
        need: { ckusdt: ckusdtPrice > 0, icusd: icusdPrice > 0, pdc, pdt, bob: hasBob },
      };
    }

    function marketNeedMet(s, facts) {
      return s.need.every(k => facts.need[k]);
    }

    // Returns { state, bps, thr, reason } for one strategy row.
    function strategyLive(s, facts) {
      const c = facts.c;
      if (!c) return { state: 'STALE', bps: null, thr: 50, reason: null };
      if (!marketNeedMet(s, facts)) return { state: 'UNCONFIGURED', bps: null, thr: 50, reason: null };

      const thr = s.id === 'S' ? (bi(c.bob_min_spread_bps) || 150) : (bi(c.min_spread_bps) || 50);
      const bpsRaw = facts.spread(s.spreadField);
      const bps = bpsRaw == null ? null : Math.abs(bpsRaw);

      if (s.family === 'rumi-cross' && c.rumi_amm_paused) return { state: 'PAUSED', bps, thr, reason: 'Rumi AMM' };
      if (c.paused) return { state: 'PAUSED', bps, thr, reason: 'bot' };

      if (s.id === 'S') {
        const pendingBob = latestHealthReport ? optVal(latestHealthReport.pending_bob_exit) : null;
        if (pendingBob) return { state: 'BLOCKED', bps, thr, reason: 'BOB exit pending' };
        if (!c.bob_execution_enabled) return { state: 'DRY-RUN', bps, thr, reason: null };
        return { state: 'LIVE', bps, thr, reason: null };
      }

      if (s.family === 'rumi-cross' && latestHealthReport) {
        const pending = optVal(latestHealthReport.pending_exit);
        if (pending && strategyForPendingExit(pending) === s.id) return { state: 'BLOCKED', bps, thr, reason: 'exit pending' };
      }
      if (latestHealthReport) {
        const stuckSecs = arbCycleStuckSecs(latestHealthReport);
        if (stuckSecs != null && latestHealthReport.arb_cycle_in_progress) return { state: 'STUCK', bps, thr, reason: Math.floor(stuckSecs / 60) + 'm' };
      }
      if (bps == null) return { state: 'STALE', bps, thr, reason: null };
      return { state: 'LIVE', bps, thr, reason: null };
    }

    // Returns { state, reason, facts:{...} } for one volume pool cost-center row.
    function volumeLive(pool) {
      const stats = latestVolumeStats;
      if (!stats) return { state: 'STALE', reason: null, facts: null };
      const status = stats[pool.statsKey];
      const cfg = status.config, st = status.state;
      const healthPool = latestHealthReport ? (latestHealthReport.pools || []).find(p => variantKey(p.pool) === variantKey(pool.poolVariant)) : null;
      const skipReason = healthPool ? optVal(healthPool.skip_reason) : null;

      let dstate = 'LIVE', reason = null;
      if (!cfg.enabled) { dstate = 'PAUSED'; reason = 'manual'; }
      else if (stats.volume_paused) { dstate = 'PAUSED'; reason = 'bot'; }
      else if (skipReason) { dstate = 'BLOCKED'; reason = skipReason; }
      else if (bi(pool.statsKey === 'icusd_bob' ? latestHealthReport?.volume_stranded_bob || 0n : latestHealthReport?.volume_stranded_icp || 0n) > 0 && latestHealthReport?.volume_cycle_in_progress) {
        dstate = 'STUCK'; reason = 'stranded funds';
      }

      const facts = {
        nextDirection: directionLabel(st.next_direction),
        tradeSize: fmtUsd6(cfg.trade_size_usd),
        dailyCost: fmtSignedUsd6(st.daily_cost_usd), dailyCap: fmtUsd6(cfg.daily_cost_cap_usd),
        tradeCount: bi(st.trade_count),
        idleThreshold: bi(cfg.idle_threshold_bps) + ' bps',
        inputBalance: healthPool && optVal(healthPool.input_balance) != null ? (Number(optVal(healthPool.input_balance)) / 1e8).toFixed(4) + ' ' + pool.tokenSym : (isAdmin ? '—' : 'login for detail'),
        minRequired: healthPool && optVal(healthPool.min_required_native) != null ? (Number(optVal(healthPool.min_required_native)) / 1e8).toFixed(4) + ' ' + pool.tokenSym : (isAdmin ? '—' : 'login for detail'),
        lastPrice: healthPool && optVal(healthPool.last_price) != null ? (Number(optVal(healthPool.last_price)) / 1e8).toFixed(6) : (optVal(st.last_price) != null ? (Number(optVal(st.last_price)) / 1e8).toFixed(6) : '—'),
        currentPrice: healthPool && optVal(healthPool.current_price) != null ? (Number(optVal(healthPool.current_price)) / 1e8).toFixed(6) : (isAdmin ? '—' : 'login for detail'),
        costPct: cfg.daily_cost_cap_usd > 0n ? Math.min(100, (Number(st.daily_cost_usd) / Number(cfg.daily_cost_cap_usd)) * 100) : 0,
      };
      return { state: dstate, reason, facts };
    }

    // ═══════ Attention list (Cockpit) ═══════

    function attentionItems() {
      const facts = marketFacts();
      const items = [];
      const stale = !currentConfig || (window._snapAgeStale === true);
      STRATEGIES.forEach(s => {
        const live = strategyLive(s, facts);
        if (live.state === 'BLOCKED' || live.state === 'STUCK') {
          items.push({ key: 'strat-' + s.id, kind: 'incident',
            title: `${s.id} ${mirroredPair(s.pair)} — ${live.state === 'STUCK' ? 'cycle stuck ' + live.reason : 'blocked' + (live.reason ? ' · ' + esc(live.reason) : '')}`,
            meta: `${VENUES[s.vA].name} × ${VENUES[s.vB].name}${stale ? ' · as of ' + new Date().toLocaleTimeString() : ''}`,
            actionLabel: 'View market', go: () => viewMarket(s.id) });
          return;
        }
        if (live.state === 'LIVE' && live.bps != null && live.bps >= live.thr && !state.dismissedAttn.has(s.id)) {
          items.push({ key: s.id, kind: 'opportunity',
            title: `${s.id} ${mirroredPair(s.pair)} — spread ${live.bps} bps ≥ ${live.thr} bps`,
            meta: `${VENUES[s.vA].name} × ${VENUES[s.vB].name} · ready to force${stale ? ' · as of ' + new Date().toLocaleTimeString() : ''}`,
            actionLabel: 'View market →', go: () => viewMarket(s.id) });
        }
      });
      VOLUME_POOLS.forEach(p => {
        const live = volumeLive(p);
        if (live.state === 'BLOCKED' || live.state === 'STUCK') {
          items.push({ key: 'pool-' + p.id, kind: 'incident',
            title: `Volume · ${esc(p.pair)} — ${live.state === 'STUCK' ? 'cycle stuck' : 'blocked'}${live.reason ? ' · ' + esc(live.reason) : ''}`,
            meta: `${p.venueName}${stale ? ' · as of ' + new Date().toLocaleTimeString() : ''}`,
            actionLabel: 'Fix', go: () => goTo('ops') });
        }
      });
      return items;
    }
    window.dismissAttn = function (key) { state.dismissedAttn.add(key); renderCockpit(); };
    window.cockpitAttnAction = function (key) {
      const item = attentionItems().find(i => i.key === key);
      if (item) item.go();
    };
    window.viewMarket = function (id) {
      goTo('markets');
      state.expandedRows.add(id);
      renderMarkets();
      const row = document.querySelector(`#view-markets .market-row[data-id="${id}"]`);
      if (row) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
    };

    // ═══════ Trade-leg attribution (Ledger + Markets "recent trades") ═══════
    //
    // TradeLeg has no strategy_letter field. Attribution is derived from real,
    // recorded fields only: each leg's `dex` (venue) and sold/bought token
    // symbols, matched against the STRATEGIES registry's venue pair + tokens.
    // Where the match isn't unique (or dex/tokens don't match any registry
    // entry), the venue pair renders without a letter — never fabricated.
    // Real dex strings are compound, e.g. "ICPSwap-icUSD", "ICPSwap-BOB-ICP",
    // "ICPSwap-icUSD-BOB" (verified live against mainnet get_trade_legs) — not
    // the bare venue name. Match by prefix, not exact equality.
    function dexToVenue(dex) {
      const d = String(dex || '');
      if (/^rumi/i.test(d)) return 'rumi';
      if (/^icpswap/i.test(d)) return 'icpswap';
      if (/^party ?dex/i.test(d)) return 'partydex';
      return null;
    }
    function legTokens(leg) { return [leg.sold_token, leg.bought_token].join(' '); }
    function tokensOf(str) { return (String(str).match(/ckUSDC|ckUSDT|icUSD|3USD|BOB/g) || []).slice().sort().join(','); }

    // Groups a chronological (oldest-first) run of TradeLeg into cycle entries:
    // a pending Leg1 paired with the next Leg2/Drain (combined P&L), or a lone
    // TopUp/unmatched Drain shown standalone. Mirrors the pairing math already
    // used for per-leg P&L display, just grouped into one row per cycle.
    function pairLegs(legsChronological) {
      const entries = [];
      let pending = null; // { leg1, cost, fees }
      for (const leg of legsChronological) {
        const lt = leg.leg_type;
        if ('Leg1' in lt) {
          if (pending) entries.push({ legs: [pending.leg1], pnl: null, unpaired: true });
          pending = { leg1: leg, cost: bi(leg.sold_usd_value), fees: bi(leg.fees_usd) };
        } else if ('Leg2' in lt || 'Drain' in lt) {
          if (pending) {
            const revenue = bi(leg.bought_usd_value);
            const totalFees = pending.fees + bi(leg.fees_usd);
            const pnl = revenue - pending.cost - totalFees;
            const tokens = tokensOf(legTokens(pending.leg1) + ' ' + legTokens(leg));
            const vA = dexToVenue(pending.leg1.dex) || null;
            const vB = dexToVenue(leg.dex) || null;
            let stratId = null;
            if (tokens.includes('BOB')) stratId = 'S';
            else if (vA && vB) {
              const m = STRATEGIES.find(s => [s.vA, s.vB].sort().join(',') === [vA, vB].sort().join(',') && tokensOf(s.pair) === tokens);
              stratId = m ? m.id : null;
            }
            entries.push({ legs: [pending.leg1, leg], pnl, stratId, vA, vB, ts: leg.timestamp, amount: pending.cost });
            pending = null;
          } else {
            entries.push({ legs: [leg], pnl: null, unpaired: true, ts: leg.timestamp,
              vA: dexToVenue(leg.dex) || null, amount: bi(leg.bought_usd_value || leg.sold_usd_value) });
          }
        } else { // TopUp
          entries.push({ legs: [leg], pnl: null, topUp: true, ts: leg.timestamp, vA: dexToVenue(leg.dex) || null });
        }
      }
      if (pending) entries.push({ legs: [pending.leg1], pnl: null, unpaired: true, ts: pending.leg1.timestamp, vA: dexToVenue(pending.leg1.dex) || null });
      return entries;
    }

    // Per-strategy "last trade" cache for Markets rows + expanded-row recent
    // trades, refreshed once per loadAll() from a wider recent-legs fetch.
    let lastLegsByStrategy = {};
    async function refreshLegAttribution() {
      try {
        const legs = await anonymousActor.get_trade_legs(BigInt(0), BigInt(120));
        const entries = pairLegs(legs); // legs already oldest→newest per storage order
        const map = {};
        for (const e of entries) {
          if (!e.stratId) continue;
          (map[e.stratId] = map[e.stratId] || []).push(e);
        }
        Object.keys(map).forEach(id => map[id].reverse()); // newest-first
        lastLegsByStrategy = map;
      } catch (e) { console.error('refreshLegAttribution:', e); }
    }

    // ═══════ Money math shared by Cockpit + Money ═══════

    function pocketUsd(b) {
      if (!b) return 0;
      const prices = window._latestPrices || {};
      const vp = prices.vp || 1, icpUsd = prices.icpswap || 0, bobUsd = window._latestBobUsd || 0;
      return (bi(b.b3usd || 0) / 1e8 * vp) + (bi(b.bCkusdc || 0) / 1e6) + (bi(b.bCkusdt || 0) / 1e6)
        + (bi(b.bIcusd || 0) / 1e8) + (bi(b.bIcp || 0) / 1e8 * icpUsd) + (bi(b.bBob || 0) / 1e8 * bobUsd);
    }

    function nextCycleCountdown() {
      const c = currentConfig, snap = latestSnapshot;
      if (!c || !snap || snap.__cold) return null;
      const intervalSecs = bi(c.arb_interval_secs);
      const lastTs = bi(snap.timestamp) / 1e9;
      const elapsed = Date.now() / 1000 - lastTs;
      const remain = Math.max(0, Math.round(intervalSecs - elapsed));
      const m = Math.floor(remain / 60), s = remain % 60;
      return `${m}m ${s}s`;
    }

    // ═══════ Markets ═══════

    function badgeHtml(live) {
      switch (live.state) {
        case 'PAUSED': return `<span class="badge badge-paused">Paused${live.reason ? ` <span class="badge-reason">· ${esc(live.reason)}</span>` : ''}</span>`;
        case 'DRY-RUN': return `<span class="badge badge-dryrun">Dry-run</span>`;
        case 'UNCONFIGURED': return `<span class="badge badge-unconfigured">Unconfigured</span>`;
        case 'BLOCKED': return `<span class="badge badge-blocked">Blocked${live.reason ? ` <span class="badge-reason">· ${esc(live.reason)}</span>` : ''}</span>`;
        case 'STUCK': return `<span class="badge badge-stuck">Stuck${live.reason ? ` <span class="badge-reason">· ${esc(live.reason)}</span>` : ''}</span>`;
        case 'STALE': return `<span class="badge badge-unconfigured">Stale</span>`;

    function gaugeHtml(live) {

      const pct = Math.min(100, (live.bps / maxBps) * 100);
      const thrPct = Math.min(100, (live.thr / maxBps) * 100);
      const hot = live.bps >= live.thr;
      return `<div class="m-gauge">
        <div class="m-gauge-track">
          <div class="m-gauge-fill${hot ? ' hot' : ''}" style="width:${pct}%"></div>
          <div class="m-gauge-threshold" style="left:${thrPct}%"></div>

        <div class="m-gauge-label">${live.bps} / ${live.thr} bps</div>

    let chartInstances = [];

    function destroyCharts() { chartInstances.forEach(c => { try { c.remove(); } catch (e) {} }); chartInstances = []; }

    function filterByRange(snapshots, rangeSeconds) {
      if (rangeSeconds === 0) return snapshots;
      const now = Date.now() * 1e6;
      const cutoff = now - rangeSeconds * 1e9;
      return snapshots.filter(sn => bi(sn.timestamp) >= cutoff);
    }

    function hue(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
    function baseChartOptions(container) {
      return {
        layout: { background: { color: 'transparent' }, textColor: '#8b93a8', fontFamily: 'IBM Plex Mono' },
        grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { timeVisible: true, secondsVisible: false, borderColor: 'rgba(255,255,255,0.06)' },
        rightPriceScale: { borderColor: 'rgba(255,255,255,0.06)' },
        width: container.clientWidth, height: container.clientHeight || 220,
      };
    }
    function mountChart(containerId, heightPx) {
      const container = document.getElementById(containerId);
      if (!container) return null;
      container.innerHTML = '';
      container.style.height = (heightPx || 220) + 'px';
      const chart = LightweightCharts.createChart(container, baseChartOptions(container));
      const ro = new ResizeObserver(() => chart.applyOptions({ width: container.clientWidth }));
      ro.observe(container);
      chartInstances.push(chart);
      return chart;
    }

    function renderFamilySpreadChart(fam) {

        const series = chart.addLineSeries({ color: seriesColor, lineWidth: 1.6, title: s.id, priceLineVisible: false, lastValueVisible: false });
        series.setData(snaps.map(sn => ({ time: Math.floor(bi(sn.timestamp) / 1e9), value: bi(sn[s.spreadField] !== undefined ? sn[s.spreadField] : 0) })));
        const markers = snaps.filter(sn => sn.traded && sn.strategy_used === s.id)
          .map(sn => ({ time: Math.floor(bi(sn.timestamp) / 1e9), position: 'aboveBar', color: seriesColor, shape: 'circle', size: 1 }));

    function renderPriceChart() {
      const chart = mountChart('chart-container', 460);

      const snaps = filterByRange(snapshotCache, currentRange);
      if (!snaps.length) { showChartEmpty(); return; } hideChartEmpty();
      const rumi = chart.addLineSeries({ color: hue('--v-rumi'), lineWidth: 2, title: 'Rumi (USD)', priceLineVisible: false });
      const icpswap = chart.addLineSeries({ color: hue('--v-icpswap'), lineWidth: 2, title: 'ICPSwap (USD)', priceLineVisible: false });
      rumi.setData(snaps.map(s => ({ time: Math.floor(bi(s.timestamp) / 1e9), value: bi(s.rumi_icp_price_usd) / 1e6 })));
      icpswap.setData(snaps.map(s => ({ time: Math.floor(bi(s.timestamp) / 1e9), value: bi(s.icpswap_icp_price_ckusdc) / 1e6 })));
      chart.timeScale().fitContent();
      updateChartFooter(snaps.length);
    }

    async function renderPnlChart() {
      const chart = mountChart('chart-container', 460);
      if (!chart) return;
      let allLegs = [], offset = 0;
      while (true) {
        const batch = await anonymousActor.get_trade_legs(BigInt(offset), BigInt(2000));
        allLegs.push(...batch);
        if (batch.length < 2000) break;
        offset += 2000;
      }
      if (!allLegs.length) { showChartEmpty(); return; } hideChartEmpty();
      let cum = 0; const data = [];
      for (const leg of allLegs) {
        cum += (bi(leg.bought_usd_value) - bi(leg.sold_usd_value) - bi(leg.fees_usd));
        if ('Leg2' in leg.leg_type || 'Drain' in leg.leg_type) data.push({ time: Math.floor(bi(leg.timestamp) / 1e9), value: cum / 1e6 });
      }
      // get_trade_legs isn't guaranteed strictly chronological end-to-end
      // (verified live: later pages can carry earlier timestamps than
      // earlier ones) — lightweight-charts requires strictly ascending,
      // de-duplicated time values or the series silently fails to paint.
      data.sort((a, b) => a.time - b.time);
      const deduped = [];
      for (const pt of data) {
        if (deduped.length && deduped[deduped.length - 1].time === pt.time) deduped[deduped.length - 1] = pt;
        else deduped.push(pt);
      }
      const series = chart.addAreaSeries({ lineColor: hue('--profit'), topColor: 'rgba(0,212,170,0.25)', bottomColor: 'rgba(0,212,170,0.02)', lineWidth: 2, priceLineVisible: false });
      series.setData(deduped);
      chart.timeScale().fitContent();
      updateChartFooter(deduped.length, `${allLegs.length} legs → ${deduped.length} cycles`);
    }

    function renderBalanceChart() {
      const chart = mountChart('chart-container', 460);
      if (!chart) return;
      const snaps = filterByRange(snapshotCache, currentRange);
      if (!snaps.length) { showChartEmpty(); return; } hideChartEmpty();
      const series = {
        icp: chart.addLineSeries({ color: hue('--v-icp'), lineWidth: 1, title: 'ICP (USD)', priceLineVisible: false }),
        threeUsd: chart.addLineSeries({ color: hue('--v-rumi'), lineWidth: 1, title: '3USD (USD)', priceLineVisible: false }),
        ckusdc: chart.addLineSeries({ color: hue('--v-icpswap'), lineWidth: 1, title: 'ckUSDC (USD)', priceLineVisible: false }),
        ckusdt: chart.addLineSeries({ color: hue('--v-partydex'), lineWidth: 1, title: 'ckUSDT (USD)', priceLineVisible: false }),
        icusd: chart.addLineSeries({ color: hue('--warning'), lineWidth: 1, title: 'icUSD (USD)', priceLineVisible: false }),
        total: chart.addLineSeries({ color: hue('--text-primary'), lineWidth: 2, title: 'Total (USD)', priceLineVisible: false }),
      };
      const data = snaps.map(s => {
        const t = Math.floor(bi(s.timestamp) / 1e9);
        const icpPrice = bi(s.icpswap_icp_price_ckusdc) / 1e6, vp = bi(s.virtual_price) / 1e18;
        const icpUsd = bi(s.balance_icp) / 1e8 * icpPrice, threeUsd = bi(s.balance_3usd) / 1e8 * (vp || 1);

        return { t, icpUsd, threeUsd, ckusdcUsd, ckusdtUsd, icusdUsd, total: icpUsd + threeUsd + ckusdcUsd + ckusdtUsd + icusdUsd };
      });
      series.icp.setData(data.map(d => ({ time: d.t, value: d.icpUsd })));

      series.icusd.setData(data.map(d => ({ time: d.t, value: d.icusdUsd })));
      series.total.setData(data.map(d => ({ time: d.t, value: d.total })));
      chart.timeScale().fitContent();
      updateChartFooter(snaps.length);
    }
