    // ═══════ Swap panel logic (real routes) ═══════

    function swapRoute() {
      const from = document.getElementById('swap-from-token').value, to = document.getElementById('swap-to-token').value;
      if (from === to) return { type: 'invalid', label: 'Same token' };
      const stables = ['ckusdc', 'ckusdt', 'icusd'];
      const isFromStable = stables.includes(from), isToStable = stables.includes(to);
      if (from === 'icp' && to === '3usd') return { type: 'rumi', label: 'via Rumi AMM' };
      if (from === '3usd' && to === 'icp') return { type: 'rumi', label: 'via Rumi AMM' };
      if (isFromStable && to === '3usd') return { type: '3pool_deposit', label: 'via 3pool deposit' };
      if (from === '3usd' && isToStable) return { type: '3pool_redeem', label: 'via 3pool redeem' };
      if (from === 'icp' && isToStable) return { type: 'rumi+3pool', label: 'via Rumi AMM + 3pool' };
      if (isFromStable && to === 'icp') return { type: '3pool+rumi', label: 'via 3pool + Rumi AMM' };
      if (isFromStable && isToStable) return { type: '3pool_swap', label: 'via 3pool swap' };
      if (from === 'bob' || to === 'bob') return { type: 'invalid', label: 'BOB has no manual-swap route — use ICPSwap/PartyDEX directly' };
      return { type: 'invalid', label: 'Unsupported pair' };
    }
    function swapUpdateRoute() {
      const route = swapRoute();
      document.getElementById('swap-route-info').textContent = route.label;
      document.getElementById('swap-execute-btn').disabled = route.type === 'invalid';
    }
    window.swapTokenChanged = function () {
      document.getElementById('swap-from-logo').src = LOGOS[TOKEN_LOGO_KEYS[MONEY_TOKENS.find(t => t.key === document.getElementById('swap-from-token').value).sym]] || '';
      document.getElementById('swap-to-logo').src = LOGOS[TOKEN_LOGO_KEYS[MONEY_TOKENS.find(t => t.key === document.getElementById('swap-to-token').value).sym]] || '';
      swapUpdateRoute(); swapUpdateBalances(); swapQuote();
    };
    window.swapFlip = function () {
      const f = document.getElementById('swap-from-token'), t = document.getElementById('swap-to-token');
      const tmp = f.value; f.value = t.value; t.value = tmp;
      document.getElementById('swap-from-amount').value = '';
      document.getElementById('swap-to-amount-display').textContent = '—';
      swapTokenChanged();
    };
    window.swapUpdateBalances = async function () {
      if (!currentConfig) return;
      const fromKey = document.getElementById('swap-from-token').value, toKey = document.getElementById('swap-to-token').value;
      const botAccount = { owner: Principal.fromText(canisterId), subaccount: [] };
      try {
        const fromInfo = TOKEN_INFO[fromKey], toInfo = TOKEN_INFO[toKey];
        if (fromInfo?.getLedger()) {
          const b = await (await createBalanceActor(fromInfo.getLedger())).icrc1_balance_of(botAccount);
          document.getElementById('swap-from-bal').textContent = fmtTok(b, fromInfo.decimals);
          document.getElementById('swap-from-bal')._rawBal = b; document.getElementById('swap-from-bal')._decimals = fromInfo.decimals;
        }
        if (toInfo?.getLedger()) {
          const b = await (await createBalanceActor(toInfo.getLedger())).icrc1_balance_of(botAccount);
          document.getElementById('swap-to-bal') && (document.getElementById('swap-to-bal').textContent = fmtTok(b, toInfo.decimals));
        }
      } catch (e) { console.error('swapUpdateBalances:', e); }
    };
    window.swapSetMax = function () {
      const el = document.getElementById('swap-from-bal');
      if (el._rawBal != null) {
        document.getElementById('swap-from-amount').value = (bi(el._rawBal) / 10 ** (el._decimals || 8)).toFixed(el._decimals > 6 ? 4 : 2);
        swapQuote();
      }
    };
    window.swapQuote = function () { clearTimeout(quoteTimer); quoteTimer = setTimeout(swapQuoteNow, 400); };
    async function swapQuoteNow() {
      if (!authenticatedActor) { document.getElementById('swap-quote-info').textContent = 'Log in to quote'; return; }
      const route = swapRoute();
      if (route.type === 'invalid') return;
      const amtStr = document.getElementById('swap-from-amount').value.trim();
      if (!amtStr || isNaN(Number(amtStr)) || Number(amtStr) <= 0) { document.getElementById('swap-to-amount-display').textContent = '—'; document.getElementById('swap-quote-info').textContent = ''; return; }
      const fromKey = document.getElementById('swap-from-token').value, toKey = document.getElementById('swap-to-token').value;
      const fromInfo = TOKEN_INFO[fromKey], toInfo = TOKEN_INFO[toKey];
      const raw = humanToRaw(amtStr, fromInfo.decimals);
      document.getElementById('swap-quote-info').textContent = 'Quoting…';
      try {
        let outRaw;
        if (route.type === 'rumi') outRaw = (await authenticatedActor.rumi_quote(Principal.fromText(fromInfo.getLedger()), raw)).estimated_output;
        else if (route.type === '3pool_deposit') outRaw = (await authenticatedActor.pool_quote_deposit(POOL_COIN_MAP[fromKey].index, raw)).estimated_output;
        else if (route.type === '3pool_redeem') outRaw = (await authenticatedActor.pool_quote_redeem(POOL_COIN_MAP[toKey].index, raw)).estimated_output;
        else if (route.type === '3pool_swap') outRaw = (await authenticatedActor.pool_quote_exchange(POOL_COIN_MAP[fromKey].index, POOL_COIN_MAP[toKey].index, raw)).estimated_output;
        else if (route.type === 'rumi+3pool') {
          const rumiRes = await authenticatedActor.rumi_quote(Principal.fromText(TOKEN_INFO.icp.getLedger()), raw);
          outRaw = (await authenticatedActor.pool_quote_redeem(POOL_COIN_MAP[toKey].index, rumiRes.estimated_output)).estimated_output;
        } else if (route.type === '3pool+rumi') {
          const poolRes = await authenticatedActor.pool_quote_deposit(POOL_COIN_MAP[fromKey].index, raw);
          outRaw = (await authenticatedActor.rumi_quote(Principal.fromText(TOKEN_INFO['3usd'].getLedger()), poolRes.estimated_output)).estimated_output;
        }
        const outNum = bi(outRaw) / 10 ** toInfo.decimals;
        document.getElementById('swap-to-amount').value = outNum;
        document.getElementById('swap-to-amount-display').textContent = outNum.toFixed(toInfo.decimals > 6 ? 4 : 2) + ' ' + toInfo.label;
        const rate = Number(amtStr) > 0 ? (outNum / Number(amtStr)).toFixed(6) : '--';
        document.getElementById('swap-quote-info').textContent = `1 ${fromInfo.label} ≈ ${rate} ${toInfo.label}`;
      } catch (e) { document.getElementById('swap-quote-info').textContent = 'Quote failed'; console.error('swapQuote:', e); }
    }
    window.confirmSwap = function () {
      if (!requireAuth()) return;
      const route = swapRoute();
      if (route.type === 'invalid') { toast('Invalid swap route', 'error'); return; }
      const fromKey = document.getElementById('swap-from-token').value, toKey = document.getElementById('swap-to-token').value;
      const fromInfo = TOKEN_INFO[fromKey], toInfo = TOKEN_INFO[toKey];
      const amtStr = document.getElementById('swap-from-amount').value.trim();
      if (!amtStr || Number(amtStr) <= 0) { toast('Enter an amount', 'error'); return; }
      openModal({
        title: 'Swap',
        body: `Swap <span class="amount">${esc(amtStr)} ${fromInfo.label}</span> → receive ≈ <span class="amount">${document.getElementById('swap-to-amount-display').textContent}</span>, ${esc(route.label)}.`,
        confirmLabel: 'Swap',
        onConfirm: () => swapExecute(amtStr, fromKey, toKey, route),
      });
    };
    async function swapExecute(amtStr, fromKey, toKey, route) {
      const fromInfo = TOKEN_INFO[fromKey], toInfo = TOKEN_INFO[toKey];
      const raw = humanToRaw(amtStr, fromInfo.decimals);
      const minOut = BigInt(0);
      try {
        if (route.type === 'rumi') await authenticatedActor.rumi_manual_swap(Principal.fromText(fromInfo.getLedger()), raw, minOut);
        else if (route.type === '3pool_deposit') await authenticatedActor.pool_deposit(POOL_COIN_MAP[fromKey].index, raw, minOut);
        else if (route.type === '3pool_redeem') await authenticatedActor.pool_redeem(POOL_COIN_MAP[toKey].index, raw, minOut);
        else if (route.type === '3pool_swap') await authenticatedActor.pool_exchange(POOL_COIN_MAP[fromKey].index, POOL_COIN_MAP[toKey].index, raw, minOut);
        else if (route.type === 'rumi+3pool') {
          await authenticatedActor.rumi_manual_swap(Principal.fromText(TOKEN_INFO.icp.getLedger()), raw, minOut);
          const bal3usd = await (await createBalanceActor(TOKEN_INFO['3usd'].getLedger())).icrc1_balance_of({ owner: Principal.fromText(canisterId), subaccount: [] });
          await authenticatedActor.pool_redeem(POOL_COIN_MAP[toKey].index, bal3usd, minOut);
        } else if (route.type === '3pool+rumi') {
          await authenticatedActor.pool_deposit(POOL_COIN_MAP[fromKey].index, raw, minOut);
          const bal3usd = await (await createBalanceActor(TOKEN_INFO['3usd'].getLedger())).icrc1_balance_of({ owner: Principal.fromText(canisterId), subaccount: [] });
          await authenticatedActor.rumi_manual_swap(Principal.fromText(TOKEN_INFO['3usd'].getLedger()), bal3usd, minOut);
        }
        toast(`Swapped ${amtStr} ${fromInfo.label} → ${toInfo.label}`, 'success');
        document.getElementById('swap-from-amount').value = '';
        document.getElementById('swap-to-amount-display').textContent = '—';
        loadAll(); swapUpdateBalances();
      } catch (e) { toast('Swap failed: ' + e.message, 'error'); }
    }

    // ═══════ Deposit / Withdraw (arb main) ═══════

    window.doDeposit = async function (tokenKey) {
      if (!authClient || !(await authClient.isAuthenticated())) { toast('Please log in first', 'error'); return; }
      if (!currentConfig) return;
      const info = TOKEN_INFO[tokenKey]; if (!info) return;
      const ledgerId = info.getLedger(); if (!ledgerId) return;
      const identity = authClient.getIdentity();
      const actor = await createAuthLedgerActor(ledgerId, identity);
      const [balance, fee] = await Promise.all([actor.icrc1_balance_of({ owner: identity.getPrincipal(), subaccount: [] }), actor.icrc1_fee()]);
      if (bi(balance) <= bi(fee)) { toast(`No ${info.label} to deposit`, 'error'); return; }
      const amt = BigInt(balance) - BigInt(fee);
      const display = (Number(amt) / 10 ** info.decimals).toFixed(info.decimals > 6 ? 4 : 2);
      openModal({
        title: 'Deposit', body: `Deposit <span class="amount">${display} ${info.label}</span> from your wallet to arb main.<div style="margin-top:8px" class="text-ter" style="font-size:11px">Fee: ${fmtTok(fee, info.decimals)} ${info.label}</div>`,
        confirmLabel: 'Deposit',
        onConfirm: async () => {
          const res = await actor.icrc1_transfer({ from_subaccount: [], to: { owner: Principal.fromText(canisterId), subaccount: [] }, amount: amt, fee: [], memo: [], created_at_time: [] });
          if ('Ok' in res) { toast(`Deposited ${display} ${info.label}`, 'success'); loadAll(); }
          else toast(`Transfer failed: ${Object.keys(res.Err)[0]}`, 'error');
        },
      });
    };

    window.confirmWithdraw = function () {
      if (!requireAuth()) return;
      const tokenKey = document.getElementById('w-token').value, to = document.getElementById('w-to').value.trim(), amountStr = document.getElementById('w-amount').value.trim();
      if (!to || !amountStr) { toast('Fill in recipient and amount', 'error'); return; }
      const info = TOKEN_INFO[tokenKey];
      let toPrincipal;
      try { toPrincipal = Principal.fromText(to); } catch { toast('Invalid destination principal', 'error'); return; }
      openModal({
        title: 'Withdraw — check every line', danger: true,
        body: `
          <div class="modal-kv"><span class="k">Token</span><span class="v">${esc(info.label)}</span></div>
          <div class="modal-kv"><span class="k">Amount</span><span class="v">${esc(amountStr)}</span></div>
          <div class="modal-kv"><span class="k">From</span><span class="v">arb main</span></div>
          <div class="modal-kv"><span class="k">Destination</span><span class="v">${esc(to)}</span></div>
          <div style="margin-top:10px">This leaves the canister. There is no undo.</div>`,
        confirmLabel: `Withdraw ${amountStr} ${info.label}`,
        onConfirm: async () => {
          await authenticatedActor.withdraw(Principal.fromText(info.getLedger()), toPrincipal, humanToRaw(amountStr, info.decimals));
          toast(`Withdrew ${amountStr} ${info.label}`, 'success');
          document.getElementById('w-to').value = ''; document.getElementById('w-amount').value = '';
          loadAll();
        },
      });
    };

    // ═══════ Fund / withdraw volume subaccount ═══════

    const VOLUME_TOKEN_PRINCIPALS = { icp: () => currentConfig?.icp_ledger, icusd: () => Principal.fromText('t6bor-paaaa-aaaap-qrd5q-cai'), '3usd': () => currentConfig?.three_usd_ledger, bob: () => currentConfig?.bob_ledger };
    const VOLUME_TOKEN_DECIMALS = { icp: 8, icusd: 8, '3usd': 8, bob: 8 };

      if (!amtStr) { toast('Enter an amount', 'error'); return; }

    window.withdrawVolume = async function (btn) {

      if (!amtStr) { toast('Enter an amount', 'error'); return; }

    // ═══════ Volume-side swap (ICP ⇔ icUSD) ═══════

    const VOL_SWAP_TOKENS = { icp: { decimals: 8, label: 'ICP', getLedger: () => currentConfig?.icp_ledger.toText() }, icusd: { decimals: 8, label: 'icUSD', getLedger: () => 't6bor-paaaa-aaaap-qrd5q-cai' } };
    function volSwapRoute() {
      const from = document.getElementById('vol-swap-from-token').value, to = document.getElementById('vol-swap-to-token').value;
      if (from === to) return { type: 'invalid', label: 'Same token' };
      if (from === 'icp' && to === 'icusd') return { type: 'rumi+3pool', label: 'via Rumi AMM + 3pool redeem' };
      if (from === 'icusd' && to === 'icp') return { type: '3pool+rumi', label: 'via 3pool deposit + Rumi AMM' };

    window.volSwapUpdateBalances = async function () {
      if (!currentConfig) return;
      const fromKey = document.getElementById('vol-swap-from-token').value, toKey = document.getElementById('vol-swap-to-token').value;
      const volSub = Array.from({ length: 31 }, () => 0).concat([1]);
      const volAccount = { owner: Principal.fromText(canisterId), subaccount: [volSub] };
      try {
        const fromInfo = VOL_SWAP_TOKENS[fromKey], toInfo = VOL_SWAP_TOKENS[toKey];
        if (fromInfo?.getLedger()) {
          const b = await (await createBalanceActor(fromInfo.getLedger())).icrc1_balance_of(volAccount);
          document.getElementById('vol-swap-from-bal').textContent = fmtTok(b, fromInfo.decimals);
          document.getElementById('vol-swap-from-bal')._rawBal = b; document.getElementById('vol-swap-from-bal')._decimals = fromInfo.decimals;
        }
      } catch (e) { console.error('volSwapUpdateBalances:', e); }
    };
    window.volSwapSetMax = function () {
      const el = document.getElementById('vol-swap-from-bal');
      if (el._rawBal != null) { document.getElementById('vol-swap-from-amount').value = (bi(el._rawBal) / 10 ** (el._decimals || 8)).toFixed(4); volSwapQuote(); }
    };
    window.volSwapQuote = function () { clearTimeout(volQuoteTimer); volQuoteTimer = setTimeout(volSwapQuoteNow, 400); };
    async function volSwapQuoteNow() {
      if (!authenticatedActor) return;
      const route = volSwapRoute();
      if (route.type === 'invalid') return;
      const amtStr = document.getElementById('vol-swap-from-amount').value.trim();
      if (!amtStr || isNaN(Number(amtStr)) || Number(amtStr) <= 0) { document.getElementById('vol-swap-to-amount-display').textContent = '—'; return; }
      const fromKey = document.getElementById('vol-swap-from-token').value, toKey = document.getElementById('vol-swap-to-token').value;
      const fromInfo = VOL_SWAP_TOKENS[fromKey], toInfo = VOL_SWAP_TOKENS[toKey];
      const raw = humanToRaw(amtStr, fromInfo.decimals);
      document.getElementById('vol-swap-quote-info').textContent = 'Quoting…';
      try {
        let outRaw;
        if (route.type === 'rumi+3pool') {
          const rumiRes = await authenticatedActor.rumi_quote(Principal.fromText(currentConfig.icp_ledger.toText()), raw);
          outRaw = (await authenticatedActor.pool_quote_redeem(0, rumiRes.estimated_output)).estimated_output;
        } else {
          const poolRes = await authenticatedActor.pool_quote_deposit(0, raw);
          outRaw = (await authenticatedActor.rumi_quote(Principal.fromText(currentConfig.three_usd_ledger.toText()), poolRes.estimated_output)).estimated_output;
        }
        const outNum = bi(outRaw) / 10 ** toInfo.decimals;
        document.getElementById('vol-swap-to-amount').value = outNum;
        document.getElementById('vol-swap-to-amount-display').textContent = outNum.toFixed(4) + ' ' + toInfo.label;
        document.getElementById('vol-swap-quote-info').textContent = `1 ${fromInfo.label} ≈ ${(outNum / Number(amtStr)).toFixed(6)} ${toInfo.label}`;
      } catch (e) { document.getElementById('vol-swap-quote-info').textContent = 'Quote failed'; }
    }
    window.volSwapExecute = async function (btn) {
      if (!requireAuth()) return;
      const route = volSwapRoute();

    // ═══════ Ops — Levers (three-state: on / off / applying, never optimistic) ═══════

    async function flipLever(key, onCall, offCall, currentOn) {
      if (state.levers[key] === 'applying') return;
      if (!requireAuth()) return;
      state.levers[key] = 'applying';
      renderOps();
      try {
        await (currentOn ? offCall() : onCall());
        toast(`${key}: ${currentOn ? 'off' : 'on'} — confirmed by refetch`, 'success');
        await Promise.all([loadConfig(), loadVolumeData(), fetchHealth()]);
      } catch (e) {
        toast('Toggle failed: ' + e.message, 'error');
      } finally {
        delete state.levers[key];
        renderOps();
      }
    }
    window.leverArb = () => flipLever('Arb engine', () => authenticatedActor.resume(), () => authenticatedActor.pause(), !currentConfig.paused);
    window.leverRumiAmm = () => flipLever('Rumi AMM', () => authenticatedActor.set_rumi_amm_paused(true).then(checkRes), () => authenticatedActor.set_rumi_amm_paused(false).then(checkRes), currentConfig.rumi_amm_paused);
    window.leverStrategyS = () => flipLever('Strategy S', () => authenticatedActor.set_bob_execution_enabled(true).then(checkRes), () => authenticatedActor.set_bob_execution_enabled(false).then(checkRes), currentConfig.bob_execution_enabled);
    window.leverVolume = () => flipLever('Volume engine', () => authenticatedActor.resume_volume(), () => authenticatedActor.pause_volume(), !!(latestVolumeStats && latestVolumeStats.volume_paused));
    function checkRes(r) { if (r && 'Err' in r) throw new Error(r.Err); return r; }

      const cfg = status.config;

    function markCfgDirty(el) { el.dataset.dirty = '1'; el.classList.add('cfg-dirty'); }
    function clearCfgDirty(el) { delete el.dataset.dirty; el.classList.remove('cfg-dirty'); }
    function bindDirtyTracking(ids) {
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el || el._dirtyTrackingBound) return;
        el._dirtyTrackingBound = true;
        el.addEventListener(el.type === 'checkbox' ? 'change' : 'input', () => markCfgDirty(el));
      });
    }
    function hydrateConfigForm(config) {
      if (!config || config.__coldOnly) return;
      bindDirtyTracking(Object.keys(CFG_FIELD_MAP));
      Object.entries(CFG_FIELD_MAP).forEach(([id, spec]) => {
        const el = document.getElementById(id);
        if (!el) return;
        if (el.dataset.dirty || document.activeElement === el) return;
        let raw; try { raw = spec.get(config); } catch (e) { return; }
        el.value = spec.isText ? (raw === CFG_UNSET_PRINCIPAL ? '' : raw) : spec.fmt(raw);
        clearCfgDirty(el);
      });
    }

      const icpCeilingRaw = parseFloat(document.getElementById('cfg-icp-ceiling').value);

      const bobCeilingRaw = parseFloat(document.getElementById('cfg-bob-ceiling').value);

      if (isNaN(minSpread) && isNaN(maxTradeRaw) && isNaN(minProfitRaw) && isNaN(arbIntervalRaw)
          && isNaN(partydexCkusdcFee) && isNaN(partydexCkusdtFee) && isNaN(icpFloorRaw) && isNaN(icpCeilingRaw)

          && isNaN(bobFloorRaw) && isNaN(bobCeilingRaw)) {
        toast('Enter at least one value to update', 'error'); return;

      if (isNaN(icpFloorRaw) !== isNaN(icpCeilingRaw)) { toast('ICP inventory floor and ceiling must be set together', 'error'); return; }
      if (isNaN(bobFloorRaw) !== isNaN(bobCeilingRaw)) { toast('BOB inventory floor and ceiling must be set together', 'error'); return; }
      if (isNaN(bobMaxTradeRaw) !== isNaN(bobMinSpreadRaw)) { toast('BOB max trade size and min spread must be set together', 'error'); return; }
      if (!!bobIcpPoolRaw !== !!icusdBobPoolRaw) { toast('Both BOB pool principals must be set together', 'error'); return; }

      btnLoading(btn, 'Saving…');
      try {
        if (!isNaN(minSpread) || !isNaN(maxTradeRaw) || !isNaN(minProfitRaw) || !isNaN(partydexCkusdcFee) || !isNaN(partydexCkusdtFee)) {
          const cfg = await anonymousActor.get_config();
          if (!isNaN(minSpread)) cfg.min_spread_bps = minSpread;
          if (!isNaN(maxTradeRaw)) cfg.max_trade_size_usd = BigInt(Math.round(maxTradeRaw * 1e6));
          if (!isNaN(minProfitRaw)) cfg.min_profit_usd = BigInt(Math.round(minProfitRaw * 1e6));
          if (!isNaN(partydexCkusdcFee)) cfg.partydex_ckusdc_fee_pips = partydexCkusdcFee;
          if (!isNaN(partydexCkusdtFee)) cfg.partydex_ckusdt_fee_pips = partydexCkusdtFee;
          await authenticatedActor.set_config(cfg);
        }
        if (!isNaN(arbIntervalRaw)) checkRes(await authenticatedActor.set_arb_interval_secs(BigInt(arbIntervalRaw)));
        if (!isNaN(icpFloorRaw) && !isNaN(icpCeilingRaw)) checkRes(await authenticatedActor.set_icp_inventory_band(BigInt(Math.round(icpFloorRaw * 1e8)), BigInt(Math.round(icpCeilingRaw * 1e8))));
        if (!isNaN(bobFloorRaw) && !isNaN(bobCeilingRaw)) checkRes(await authenticatedActor.set_bob_inventory_band(BigInt(Math.round(bobFloorRaw * 1e8)), BigInt(Math.round(bobCeilingRaw * 1e8))));
        if (!isNaN(bobMaxTradeRaw) && !isNaN(bobMinSpreadRaw)) checkRes(await authenticatedActor.set_bob_params(BigInt(Math.round(bobMaxTradeRaw * 1e6)), BigInt(bobMinSpreadRaw)));
        if (bobIcpPoolRaw && icusdBobPoolRaw) checkRes(await authenticatedActor.set_bob_pools(Principal.fromText(bobIcpPoolRaw), Principal.fromText(icusdBobPoolRaw)));
        toast('Config updated', 'success');
        const savedIds = [];
        if (!isNaN(minSpread)) savedIds.push('cfg-min-spread');

        if (!isNaN(partydexCkusdtFee)) savedIds.push('cfg-partydex-ckusdt-fee');
        if (!isNaN(icpFloorRaw)) savedIds.push('cfg-icp-floor');
        if (!isNaN(icpCeilingRaw)) savedIds.push('cfg-icp-ceiling');

            ${leverHtml('vol', 'Volume engine', 'Master run/pause', !(stats && stats.volume_paused), 'leverVolume()')}
            ${stats ? VOLUME_POOLS.map(p => leverHtml('pool-' + p.id, 'Volume · ' + p.pair, 'Per-pool enable', stats[p.statsKey].config.enabled, `leverVolumePool('${p.id}')`)).join('') : ''}
          </div>
          <div class="divider"></div>
          <label>Slippage (bps)</label>
          <div class="btn-group" style="margin-bottom:var(--sp-2)">
            ${[25, 50, 100].map(bps => `<button class="btn btn-sm ${slipBps === bps ? 'btn-primary' : ''}" onclick="setSlipPreset(${bps})">${(bps / 100).toFixed(2)}%</button>`).join('')}
          </div>
          <div class="fund-vol-grid">
            <div><input type="number" id="slip-input" value="${slipBps}" placeholder="bps"></div>
            <div><button class="btn btn-primary" onclick="saveSlippage(this)">Save slippage</button></div>
          </div>
          <div class="divider"></div>
          <label>Intervals &amp; caps</label>
          <div class="grid g-cols-3">
            <div><label>Arb cycle interval (s)</label><input type="number" id="cfg-arb-interval"></div>
            <div><label>Min spread (bps)</label><input type="number" id="cfg-min-spread"></div>
            <div><label>Max trade size (USD)</label><input type="number" id="cfg-max-trade" step="0.01"></div>
          </div>
          <div class="divider"></div>
          <label>Volume pool config</label>
          <div class="grid g-cols-3">
            ${VOLUME_POOLS.map(p => `
              <div class="lever">
                <div class="lever-sub" style="margin-bottom:6px">${esc(p.pair)}</div>
                <div style="display:flex;flex-direction:column;gap:6px">
                  <input type="number" id="${p.prefix}-trade-size" placeholder="Trade size $" step="0.01">
                  <input type="number" id="${p.prefix}-variance" placeholder="Variance %">
                  <input type="number" id="${p.prefix}-idle-threshold" placeholder="Idle threshold bps">
                  <input type="number" id="${p.prefix}-daily-cap" placeholder="Daily cap $" step="0.01">
                  <button class="btn btn-sm btn-primary" onclick="saveVolumePoolConfig('${p.id}')">Save</button>
                </div>
              </div>`).join('')}
          </div>
          <div class="divider"></div>
          <div class="fund-vol-grid">
            <div><label>Volume cycle interval (s)</label><input type="number" id="vol-global-interval"></div>
            <div><label>Rebalance drift (%)</label><input type="number" id="vol-global-drift"></div>
            <div><button class="btn" onclick="saveVolumeGlobal(this)">Save global</button></div>
          </div>
        </div>

        <div class="grid g-cols-2" style="margin-bottom:var(--sp-4)">
          <div class="card">
            <div class="card-header">Setup <span class="text-muted" style="font-weight:400;text-transform:none;letter-spacing:0">— touched once per venue</span></div>
            <table class="setup-table">${setupTableHtml(c)}</table>
            <div class="divider"></div>
            <div class="grid g-cols-2">
              <div><label>PartyDEX ckUSDC fee (pips)</label><input type="number" id="cfg-partydex-ckusdc-fee"></div>
              <div><label>PartyDEX ckUSDT fee (pips)</label><input type="number" id="cfg-partydex-ckusdt-fee"></div>
              <div><label>Min profit (USD)</label><input type="number" id="cfg-min-profit" step="0.01"></div>
              <div><label>ICP inventory floor</label><input type="number" id="cfg-icp-floor" step="0.01"></div>
              <div><label>ICP inventory ceiling</label><input type="number" id="cfg-icp-ceiling" step="0.01"></div>
              <div><label>BOB inventory floor</label><input type="number" id="cfg-bob-floor" step="0.01"></div>
              <div><label>BOB inventory ceiling</label><input type="number" id="cfg-bob-ceiling" step="0.01"></div>
              <div><label>BOB max trade (USD)</label><input type="number" id="cfg-bob-max-trade" step="0.01"></div>
              <div><label>BOB min spread (bps)</label><input type="number" id="cfg-bob-min-spread"></div>
            </div>
            <label style="margin-top:var(--sp-3)">BOB/ICP pool principal</label><input type="text" id="cfg-bob-icp-pool" placeholder="aaaaa-aa">
            <label style="margin-top:var(--sp-3)">icUSD/BOB pool principal</label><input type="text" id="cfg-icusd-bob-pool" placeholder="aaaaa-aa">
            <button class="btn btn-primary btn-block" style="margin-top:var(--sp-4)" onclick="saveConfig(this)">Save config</button>
          </div>
          <div style="display:flex;flex-direction:column;gap:var(--sp-4)">
            <div class="card">
              <div class="card-header">Admins</div>
              <div id="admins-list">${renderAdminsHtml()}</div>
              <div class="divider"></div>
              <div class="fund-vol-grid">
                <div><input type="text" id="admin-principal" placeholder="New admin principal"></div>
                <div><button class="btn" onclick="doAddAdmin(this)">Add admin</button></div>
              </div>
            </div>
            <div class="card incident-card${(currentWedgeKey && wedgeDismissedKey !== currentWedgeKey) ? ' hot' : ''}">
              <div class="card-header">Incident toolkit</div>
              <div class="incident-actions">
                <div class="incident-action">
                  <div><div class="incident-action-label">Clear cycle lock</div><div class="incident-action-cmd">clear_cycle_lock()</div></div>
                  <button class="btn btn-sm btn-ghost" onclick="doClearCycleLock(this)">Run</button>
                </div>
                <div class="incident-action">
                  <div><div class="incident-action-label">Recover PartyDEX balance</div><input type="text" id="incident-partydex-pool" placeholder="Pool principal" style="margin-top:4px;max-width:220px"></div>
                  <button class="btn btn-sm btn-ghost" onclick="doRecoverPartydexBalance()">Run</button>
                </div>
              </div>
              <div class="divider"></div>
              <div class="footnote">Copy dfx for the rest (backfill_trade_legs — one-off manual correction, not a routine button):</div>
              <div class="m-trade-row" style="border:none;font-size:10.5px;color:var(--text-tertiary);word-break:break-all" id="incident-backfill-cmd"></div>
            </div>
          </div>
        </div>
      `;
      hydrateConfigForm(c);
      if (stats) hydrateVolumeForms(stats);
    }

    // ═══════ Ledger ═══════

    function ledgerEntryHtml(e) {
      const legs = e.legs.length;
      const ts = e.ts ? fmtTime(e.ts) : '—';
      const strat = e.stratId ? STRATEGY_BY_ID[e.stratId] : null;
      const stratCell = strat
        ? `${vpChip(strat.vA, strat.vB, strat.id)} ${mirroredPair(strat.pair)}`
        : `<span class="text-muted">unattributed</span>`;
      const venueCell = e.vA
        ? (e.vB ? mirroredVenues(e.vA, e.vB) : `${venueLogo(e.vA)}${esc(VENUES[e.vA]?.name || e.vA)}`)
        : '—';
      const pnlCell = e.pnl != null ? `<span class="${pClass(e.pnl)}">${e.pnl >= 0 ? '+' : ''}${fmt$(e.pnl)}</span>` : `<span class="text-muted">--</span>`;
      const amountCell = e.amount != null ? fmt$(e.amount) : '—';
      const kind = e.topUp ? 'Top-up' : e.unpaired ? (('Drain' in (e.legs[0].leg_type || {})) ? 'Drain' : 'Leg 1 (unpaired)') : `${legs} legs`;
      return `<tr>
        <td class="text-ter">${ts}</td>
        <td>${stratCell}</td>
        <td style="font-family:var(--font-ui);font-size:11.5px" class="text-sec">${venueCell}</td>
        <td class="ledger-legs">${kind}</td>
        <td>${amountCell}</td>
        <td>${pnlCell}</td>
      </tr>`;
    }

    function legendHtml() {
      const famOrder = ['icpswap-internal', 'partydex-icpswap', 'rumi-cross', 'bob'];
      return `
        <div class="card" style="margin-bottom:var(--sp-4)">
          <div class="card-header">Strategy legend</div>
          <div class="legend-table">
            ${famOrder.map(fam => {
              const rows = STRATEGIES.filter(s => s.family === fam);
              return `<div class="legend-fam">${FAMILIES[fam]}</div>` + rows.map(s => {
                const parts = String(s.pair).split('↔');
                const l = parts[0].trim(), r = parts.length === 2 ? parts[1].trim() : '';
                const lt = distToken(l), rt = r ? distToken(r) : null;
                return `<div class="legend-row">${vpChip(s.vA, s.vB, s.id)}<span class="lg-tl">${lt ? tokenLogo(lt) : ''}</span><span class="lg-l">${esc(l)}</span><span class="lg-c">${r ? '↔' : ''}</span><span class="lg-r">${esc(r)}</span><span class="lg-tr">${rt ? tokenLogoR(rt) : ''}</span><span class="lg-v">${esc(VENUES[s.vA].name)} × ${esc(VENUES[s.vB].name)}</span></div>`;
              }).join('');
            }).join('')}
          </div>
        </div>`;
    }

    let ledgerCache = { entries: [], summaryCount: 0 };
    async function loadLedgerPage() {
      const tbody = document.getElementById('ledger-body');
      if (tbody) tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-tertiary)">Loading…</td></tr>';
      const offset = ledgerPageOffsets[tradesPage] !== undefined ? ledgerPageOffsets[tradesPage] : 0;
      const { shown, consumedLegs, hasMore } = await fetchLedgerGroups(offset, ledgerPageSize);
      ledgerCache.entries = shown.slice().reverse(); // newest-first within this page
      ledgerHasMore = hasMore;
      if (hasMore) ledgerPageOffsets[tradesPage + 1] = offset + consumedLegs;
      renderLedgerTable();
    }

    function renderLedgerTable() {
      const tbody = document.getElementById('ledger-body');
      if (!tbody) return;
      const filter = state.ledgerFilter;
      const rows = filter ? ledgerCache.entries.filter(e => e.stratId === filter) : ledgerCache.entries;
      tbody.innerHTML = rows.length
        ? rows.map(ledgerEntryHtml).join('')
        : `<tr><td colspan="6" style="text-align:center;color:var(--text-tertiary)">No trades on this page</td></tr>`;
      const countEl = document.getElementById('ledger-count');
      if (countEl) countEl.textContent = window._lastSummary ? `${rows.length} shown of ${bi(window._lastSummary.total_legs)} legs all-time` : '';
      const prevBtn = document.getElementById('ledger-prev'), nextBtn = document.getElementById('ledger-next'), pageEl = document.getElementById('ledger-page');
      if (prevBtn) prevBtn.disabled = tradesPage === 0;
      if (nextBtn) nextBtn.disabled = !ledgerHasMore;
      if (pageEl) pageEl.textContent = `Page ${tradesPage + 1}`;
    }
    window.ledgerPrev = () => { if (tradesPage > 0) { tradesPage--; loadLedgerPage(); } };
    window.ledgerNext = () => { if (ledgerHasMore) { tradesPage++; loadLedgerPage(); } };
    function ledgerPagesizeHtml() {
      return LEDGER_PAGESIZE_OPTIONS.map(n => `<button class="chip chip-sm ${ledgerPageSize === n ? 'active' : ''}" onclick="setLedgerPageSize(${n})">${n}/page</button>`).join('');
    }
    window.setLedgerPageSize = function (size) {
      size = parseInt(size, 10);
      if (!LEDGER_PAGESIZE_OPTIONS.includes(size) || size === ledgerPageSize) return;
      ledgerPageSize = size;
      localStorage.setItem(LEDGER_PAGESIZE_KEY, String(size));
      tradesPage = 0;
      ledgerPageOffsets = [0];
      const el = document.getElementById('ledger-pagesize');
      if (el) el.innerHTML = ledgerPagesizeHtml();
      loadLedgerPage();
    };
    window.setLedgerFilter = function (id) { state.ledgerFilter = id; renderLedgerTable(); renderNav(); document.querySelectorAll('.ledger-filters .btn').forEach(b => {}); renderLedger(); };
    window.toggleLedgerLegend = function () { state.ledgerLegendOpen = !state.ledgerLegendOpen; renderLedger(); };

    async function loadActivityIntoDom() {
      const entries = await loadActivity();
      const filterEl = document.getElementById('activity-filter');
      const filter = filterEl ? filterEl.value : '';
      const filtered = filter ? entries.filter(e => e.category === filter) : entries;
      const list = document.getElementById('activity-list');
      if (!list) return;
      const catColors = { trade: 'var(--accent)', swap: 'var(--info)', error: 'var(--loss)', admin: 'var(--v-partydex)', withdraw: 'var(--warning)', pool_deposit: 'var(--profit)', pool_redeem: 'var(--v-bob)', pool_exchange: 'var(--info)', approval: 'var(--text-secondary)', arb_skip: 'var(--text-tertiary)', arb_start: 'var(--info)', drain: 'var(--warning)' };
      list.innerHTML = filtered.length
        ? [...filtered].reverse().map(e => `<div class="activity-entry"><span class="activity-ts">${fmtTime(e.timestamp)}</span><span class="activity-cat" style="color:${catColors[e.category] || 'var(--text-tertiary)'}">${esc(e.category)}</span>${esc(e.message)}</div>`).join('')
        : `<div class="text-ter">No activity recorded</div>`;
      const prevBtn = document.getElementById('activity-prev'), nextBtn = document.getElementById('activity-next'), pageEl = document.getElementById('activity-page');
      if (prevBtn) prevBtn.disabled = activityPage === 0;
      if (nextBtn) nextBtn.disabled = entries.length < ACTIVITY_PAGE_SIZE;
      if (pageEl) pageEl.textContent = `Page ${activityPage + 1}`;
    }
    window.activityPrev = () => { if (activityPage > 0) { activityPage--; loadActivityIntoDom(); } };
    window.activityNext = () => { activityPage++; loadActivityIntoDom(); };
    window.activityFilterChanged = () => { activityPage = 0; loadActivityIntoDom(); };

    function renderLedger() {
      const el = document.getElementById('view-ledger');
      const filter = state.ledgerFilter;
      const allIds = STRATEGIES.map(s => s.id);
      el.innerHTML = `
        <div class="card-subtitle">Unified, filterable trade ledger. Legs of one arb render as a single grouped entry with combined P&amp;L. Strategy attribution is derived from real venue + token fields — unattributable legs show the venue pair, never a fabricated letter.</div>
        <div class="ledger-filters">
          <span class="text-ter" style="font-size:12px">Filter:</span>
          <button class="btn btn-sm ${!filter ? 'btn-primary' : 'btn-ghost'}" onclick="setLedgerFilter(null)">All</button>
          ${allIds.map(id => `<button class="btn btn-sm ${filter === id ? 'btn-primary' : 'btn-ghost'}" onclick="setLedgerFilter('${id}')">${id}</button>`).join('')}
          <button class="chip chip-sm ${state.ledgerLegendOpen ? 'active' : ''}" style="margin-left:auto" onclick="toggleLedgerLegend()">Legend</button>
        </div>
        ${state.ledgerLegendOpen ? legendHtml() : ''}
        <div class="card">
          <div class="table-wrap">
            <table class="ledger-table">
              <thead><tr><th>Time</th><th>Strategy</th><th>Venues</th><th>Legs</th><th>Amount</th><th>P&amp;L</th></tr></thead>
              <tbody id="ledger-body"><tr><td colspan="6" style="text-align:center;color:var(--text-tertiary)">Loading…</td></tr></tbody>
            </table>
          </div>
          <div class="pagination">
            <button class="btn btn-sm btn-ghost" id="ledger-prev" onclick="ledgerPrev()">◂ Prev</button>
            <span id="ledger-page">Page 1</span>
            <button class="btn btn-sm btn-ghost" id="ledger-next" onclick="ledgerNext()">Next ▸</button>
            <span id="ledger-pagesize" class="ledger-pagesize">${ledgerPagesizeHtml()}</span>
            <span id="ledger-count" style="margin-left:auto"></span>
          </div>
        </div>

        <div class="card" style="margin-top:var(--sp-4)">
          <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
            <span>Activity log</span>
            <select id="activity-filter" onchange="activityFilterChanged()" style="width:auto">
              <option value="">All categories</option>
              <option value="trade">trade</option><option value="swap">swap</option><option value="error">error</option>
              <option value="admin">admin</option><option value="withdraw">withdraw</option>
              <option value="pool_deposit">pool_deposit</option><option value="pool_redeem">pool_redeem</option>
              <option value="pool_exchange">pool_exchange</option><option value="approval">approval</option>
              <option value="arb_skip">arb_skip</option><option value="arb_start">arb_start</option><option value="drain">drain</option>
            </select>
          </div>
          <div id="activity-list"></div>
          <div class="pagination">
            <button class="btn btn-sm btn-ghost" id="activity-prev" onclick="activityPrev()">◂ Prev</button>
            <span id="activity-page">Page 1</span>
            <button class="btn btn-sm btn-ghost" id="activity-next" onclick="activityNext()">Next ▸</button>
          </div>
        </div>
      `;
      loadLedgerPage();
      loadActivityIntoDom();
    }

    // ═══════ Progress indicator (cold-load → live) ═══════

    function startProgress() {
      const fill = document.getElementById('progress-fill');
      fill.style.transition = 'width 2.5s linear';
      fill.style.width = '0%';
      requestAnimationFrame(() => requestAnimationFrame(() => { fill.style.width = '75%'; }));
    }
    function finishProgress() {
      const fresh = document.getElementById('freshness');
      const fill = document.getElementById('progress-fill');
      fill.style.transition = 'width .3s ease';
      fill.style.width = '100%';
      fresh.textContent = 'Live';
      fresh.classList.add('live-now');
      setTimeout(() => { fill.style.width = '0%'; }, 400);
    }

    // ═══════ Load all ═══════

    async function loadAll() {
      await loadConfig();
      await loadSummary();
      if (currentConfig) {
        loadBalances(currentConfig);
        loadVolumeBalances(currentConfig);
      }
      await loadOverviewFromSnapshot();
      await loadVolumeData();
      refreshLegAttribution();
      if (authenticatedActor) await loadPrices();
      if (authenticatedActor && currentConfig) await loadMyBalances(currentConfig);
      loadAllTickCount++;
      if (authenticatedActor && loadAllTickCount % 2 === 0) fetchHealth();
      if (!authenticatedActor) fetchPublicHealth();
      saveCache();
      state.liveLoaded = true;
      // Rendering is never allowed to break the poll loop: a template bug
      // here must not stop setInterval(loadAll) from firing next cycle —
      // that's exactly the "silent dead minute" this rebuild exists to kill.
      try { renderAll(); } catch (e) { console.error('renderAll (non-fatal):', e); }
    }

    // ═══════ Init ═══════

    async function init() {
      paintFromCache(); // never throws (see try/catch inside) — safe before actors exist
      startProgress();
      try {
        await createAnonymousActor();
        await restoreSession();
      } catch (e) {
        toast('Failed to connect: ' + (e.message || e), 'error');
        console.error('init (actor/session):', e);
      }
      // The recurring poll is scheduled unconditionally: even if this first
      // loadAll() throws (network hiccup, cold-cache edge case, etc.), the
      // next tick 30s later gets a fresh chance rather than the app going
      // dark for the rest of the session.
      try { await loadAll(); } catch (e) { console.error('loadAll (initial, non-fatal):', e); }
      finishProgress();
      setInterval(() => { loadAll().catch(e => console.error('loadAll (tick, non-fatal):', e)); }, 30000);
    }
    init();
  </script>
</body>
</html>
